name: Bot — CR Trigger

# Fires when a user requests a CodeRabbit review via:
#   - Checking one of the checkboxes in the Bot HQ comment
#   - Posting @rickcedwhat-ai review (full) or @rickcedwhat-ai review incremental
#
# Determines review type, posts the @coderabbitai command, updates labels,
# commit status, and HQ comment with trigger timestamp.

on:
  issue_comment:
    types: [created, edited]

jobs:
  trigger:
    name: Trigger CodeRabbit review
    runs-on: ubuntu-latest
    # Must be on a PR, not an issue
    if: github.event.issue.pull_request != null
    permissions:
      pull-requests: write
      statuses: write
    steps:
      - name: Checkout (for coderabbit-logic.mjs import)
        uses: actions/checkout@v4

      - name: Detect trigger and act
        uses: actions/github-script@v7
        env:
          QSTASH_TOKEN: ${{ secrets.QSTASH_TOKEN }}
          QSTASH_URL:   ${{ secrets.QSTASH_URL }}
        with:
          github-token: ${{ secrets.BOT_PAT }}
          script: |
            const path = require('path');
            const { isRateLimitComment, parseRateLimitDuration } = await import(
              `file://${path.join(process.env.GITHUB_WORKSPACE, '.github/scripts/coderabbit-logic.mjs')}`
            );
            const { owner, repo } = context.repo;
            const commentBody = context.payload.comment.body || '';
            const commentAuthor = context.payload.comment.user.login;
            const pr_number = context.issue.number;
            const action = context.payload.action;

            // ── determine trigger type ────────────────────────────────────────

            let reviewType = null; // 'full' | 'incremental' | null

            // Checkbox toggle in the HQ comment (edited event, human unchecked → checked)
            if (action === 'edited' &&
                commentAuthor === 'rickcedwhat-ai' &&
                context.payload.sender?.login !== 'rickcedwhat-ai' &&
                commentBody.includes('<!-- bot-hq -->')) {
              const oldBody = context.payload.changes?.body?.from ?? '';
              const wasFullUnchecked   = /- \[ \] Full review/i.test(oldBody);
              const wasIncrUnchecked   = /- \[ \] Incremental review/i.test(oldBody);
              const isFullChecked      = /- \[x\] Full review/i.test(commentBody);
              const isIncrChecked      = /- \[x\] Incremental review/i.test(commentBody);

              if (wasFullUnchecked && isFullChecked)   reviewType = 'full';
              else if (wasIncrUnchecked && isIncrChecked) reviewType = 'incremental';
            }

            // Text command: @rickcedwhat-ai review / @rickcedwhat-ai review incremental
            if (action === 'created' && commentAuthor !== 'rickcedwhat-ai') {
              if (/^@rickcedwhat-ai\s+review\s+incremental\b/i.test(commentBody.trim()))
                reviewType = 'incremental';
              else if (/^@rickcedwhat-ai\s+review\b/i.test(commentBody.trim()))
                reviewType = 'full';
            }

            if (!reviewType) {
              core.info('No CR trigger detected — skipping.');
              return;
            }

            core.info(`Review type: ${reviewType}`);

            // ── TEST GUARD: only act on PRs targeting the coderabbit branch ───
            // Remove this block when promoting to main.
            const { data: prData } = await github.rest.pulls.get({
              owner, repo, pull_number: pr_number,
            });
            if (prData.base.ref !== 'coderabbit') {
              core.info(`PR #${pr_number} targets "${prData.base.ref}", not "coderabbit" — skipping (test guard).`);
              return;
            }

            // ── find HQ comment ───────────────────────────────────────────────

            const allComments = await github.paginate(github.rest.issues.listComments, {
              owner, repo, issue_number: pr_number, per_page: 100,
            });
            const hqComment = allComments.find(
              c => c.user.login === 'rickcedwhat-ai' && c.body.includes('<!-- bot-hq -->')
            );

            // ── update trigger_time in HQ comment ────────────────────────────

            const triggerTime = new Date().toISOString();
            const triggerHHMM = triggerTime.slice(11, 16); // "HH:MM"
            const checkedLabel = reviewType === 'full'
              ? '- [x] Full review\n- [ ] Incremental review'
              : '- [ ] Full review\n- [x] Incremental review';

            const newCRSection = [
              '<!-- cr-section-start -->',
              `<!-- cr-trigger-time: ${triggerTime} -->`,
              '',
              '### 🔍 CodeRabbit Review',
              checkedLabel,
              '',
              `> ⏳ Waiting for CodeRabbit… _(triggered at ${triggerHHMM} UTC)_`,
              '<!-- cr-section-end -->',
            ].join('\n');

            if (hqComment) {
              const updatedBody = hqComment.body.replace(
                /<!-- cr-section-start -->[\s\S]*?<!-- cr-section-end -->/,
                newCRSection
              );
              try {
                await github.rest.issues.updateComment({
                  owner, repo, comment_id: hqComment.id, body: updatedBody,
                });
              } catch (err) {
                core.warning(`Could not update HQ comment: ${err.message}`);
              }
            }

            // ── check for pre-existing rate-limit comment ─────────────────────
            // CR can hit the rate limit automatically on PR open (before the user
            // even triggers). If that comment is still within its window, skip
            // straight to rate-limited + QStash. If the window has already passed,
            // proceed normally — the quota should have refreshed.

            // DEBUG: log all CR comments found and rate-limit detection results
            const crComments = allComments.filter(c => c.user.login === 'coderabbitai[bot]');
            core.info(`[debug] Total comments: ${allComments.length}, CR comments: ${crComments.length}`);
            for (const c of crComments) {
              const matches = isRateLimitComment(c.body);
              core.info(`[debug] CR comment at ${c.created_at}: isRateLimitComment=${matches}, body[:120]="${c.body.slice(0, 120).replace(/\n/g, '\\n')}"`);
            }

            const crRateLimitComment = allComments.find(
              c => c.user.login === 'coderabbitai[bot]' && isRateLimitComment(c.body)
            );

            core.info(`[debug] crRateLimitComment found: ${!!crRateLimitComment}`);

            if (crRateLimitComment) {
              const durationMs = parseRateLimitDuration(crRateLimitComment.body);
              const commentedAt = new Date(crRateLimitComment.created_at).getTime();
              const availableAt = commentedAt + durationMs;
              const remainingSecs = Math.ceil((availableAt - Date.now()) / 1000);

              core.info(`[debug] durationMs=${durationMs}, commentedAt=${crRateLimitComment.created_at}, remainingSecs=${remainingSecs}`);

              if (remainingSecs > 60) {
                // Still rate-limited — go straight to rate-limited + QStash
                core.info(`Pre-existing CR rate-limit found (~${remainingSecs}s remaining) — scheduling retry instead of triggering.`);

                const retryAt = new Date(availableAt + 60_000).toISOString().slice(11, 16);

                const payload = JSON.stringify({
                  event_type: 'bot-coderabbit-retry',
                  client_payload: { pr_number, repo: `${owner}/${repo}` },
                });
                let qstashId = null;
                try {
                  const qRes = await fetch(process.env.QSTASH_URL, {
                    method: 'POST',
                    headers: {
                      'Authorization': `Bearer ${process.env.QSTASH_TOKEN}`,
                      'Upstash-Delay': `${remainingSecs}s`,
                      'Content-Type': 'application/json',
                    },
                    body: payload,
                  });
                  const qBody = await qRes.json();
                  qstashId = qBody.messageId ?? null;
                } catch (err) {
                  core.warning(`QStash publish failed: ${err.message}`);
                }

                // Swap label and update HQ
                const { data: labels } = await github.rest.issues.listLabelsOnIssue({ owner, repo, issue_number: pr_number });
                for (const l of labels.filter(l => l.name.startsWith('coderabbit:'))) {
                  try { await github.rest.issues.removeLabel({ owner, repo, issue_number: pr_number, name: l.name }); } catch {}
                }
                await github.rest.issues.addLabels({ owner, repo, issue_number: pr_number, labels: ['coderabbit: rate-limited'] });

                const { data: pr } = await github.rest.pulls.get({ owner, repo, pull_number: pr_number });
                await github.rest.repos.createCommitStatus({
                  owner, repo, sha: pr.head.sha, state: 'pending',
                  context: 'coderabbit-review', description: 'CodeRabbit rate-limited · retry scheduled',
                });

                if (hqComment) {
                  const rateLimitedSection = [
                    '<!-- cr-section-start -->',
                    `<!-- cr-trigger-time: ${triggerTime} -->`,
                    '',
                    '### 🔍 CodeRabbit Review',
                    checkedLabel,
                    '',
                    [
                      '> ⏱ Rate-limited · retry scheduled',
                      qstashId ? `· QStash ID: \`${qstashId}\`` : '',
                      `· fires ~${retryAt} UTC`,
                    ].filter(Boolean).join(' '),
                    '<!-- cr-section-end -->',
                  ].join('\n');
                  try {
                    await github.rest.issues.updateComment({
                      owner, repo, comment_id: hqComment.id,
                      body: hqComment.body.replace(
                        /<!-- cr-section-start -->[\s\S]*?<!-- cr-section-end -->/,
                        rateLimitedSection
                      ),
                    });
                  } catch (err) { core.warning(`Could not update HQ comment: ${err.message}`); }
                }
                return;
              }
              core.info(`Pre-existing CR rate-limit found but window has expired (${remainingSecs}s remaining) — proceeding normally.`);
            }

            // ── swap label to waiting ─────────────────────────────────────────

            const { data: labels } = await github.rest.issues.listLabelsOnIssue({
              owner, repo, issue_number: pr_number,
            });
            for (const l of labels.filter(l => l.name.startsWith('coderabbit:'))) {
              try {
                await github.rest.issues.removeLabel({
                  owner, repo, issue_number: pr_number, name: l.name,
                });
              } catch {}
            }
            await github.rest.issues.addLabels({
              owner, repo, issue_number: pr_number, labels: ['coderabbit: waiting'],
            });

            // ── set commit status pending ─────────────────────────────────────

            const { data: pr } = await github.rest.pulls.get({
              owner, repo, pull_number: pr_number,
            });
            await github.rest.repos.createCommitStatus({
              owner, repo, sha: pr.head.sha,
              state: 'pending',
              context: 'coderabbit-review',
              description: 'CodeRabbit review in progress',
            });

            // ── post @coderabbitai command ────────────────────────────────────

            const crCommand = reviewType === 'full'
              ? '@coderabbitai full review'
              : '@coderabbitai review';

            await github.rest.issues.createComment({
              owner, repo, issue_number: pr_number, body: crCommand,
            });

            core.info(`Posted "${crCommand}" for PR #${pr_number} (trigger time: ${triggerTime})`);
