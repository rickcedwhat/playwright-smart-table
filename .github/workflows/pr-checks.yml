name: Pull Request Checks

on:
  pull_request:
    branches:
      - main

jobs:
  lint:
    name: Static Analysis & Linting
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run TypeScript Check
        run: npx tsc --noEmit

      - name: Check for TODO/FIXME
        run: |
          if grep -r "TODO\|FIXME" src/ --exclude-dir=node_modules; then
            echo "⚠️ Found TODO/FIXME comments. Please resolve before merging."
            exit 1
          fi
        continue-on-error: false

      - name: Check Commit Messages (commitlint)
        run: npx commitlint --from ${{ github.event.pull_request.base.sha }} --to ${{ github.event.pull_request.head.sha }} --verbose

  test:
    name: Integration Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Cache Playwright Browsers
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright Browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps

      - name: Install Sub-App Dependencies
        run: node scripts/install-apps.mjs

      - name: Run Tests
        run: npm test

      - name: Build Project
        run: npm run build

  coderabbit-gate:
    name: CodeRabbit Review Gate
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
      checks: read
    steps:
      - name: Wait for CodeRabbit & Check Status
        uses: actions/github-script@v7
        with:
          script: |
            const botName = 'coderabbitai[bot]';
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pull_number = context.payload.pull_request.number;

            console.log('🔍 Checking CodeRabbit review status...');

            // 1. Check for "Changes Requested" review from CodeRabbit
            const { data: reviews } = await github.rest.pulls.listReviews({
              owner,
              repo,
              pull_number,
            });
            
            const coderabbitReview = reviews.reverse().find(r => r.user.login === botName);
            if (coderabbitReview && coderabbitReview.state === 'CHANGES_REQUESTED') {
              core.setFailed('❌ CodeRabbit has requested changes. Please resolve them before merging.');
              return;
            }

            // 2. Wait for the CodeRabbit check to finish
            const maxAttempts = 15; // ~7.5 minutes
            for (let i = 0; i < maxAttempts; i++) {
              const { data: checks } = await github.rest.checks.listForRef({
                owner,
                repo,
                ref: context.payload.pull_request.head.sha,
              });
              
              const crCheck = checks.check_runs.find(c => c.name.toLowerCase().includes('coderabbit'));
              if (crCheck) {
                if (crCheck.status === 'completed') {
                  if (crCheck.conclusion === 'failure' || crCheck.conclusion === 'action_required') {
                    core.setFailed('❌ CodeRabbit check failed or requires action.');
                  } else {
                    console.log('✅ CodeRabbit check completed successfully.');
                  }
                  return;
                }
                console.log(`⏳ CodeRabbit check is still ${crCheck.status}... waiting 30s`);
              } else {
                console.log('⏳ CodeRabbit check not found yet... waiting 30s');
              }
              await new Promise(r => setTimeout(r, 30000));
            }
            console.log('⚠️ Timed out waiting for CodeRabbit check, but no blocking reviews found. Proceeding.');
