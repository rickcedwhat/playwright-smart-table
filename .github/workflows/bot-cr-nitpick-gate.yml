name: Bot — CR Nitpick Gate

# Fires when the HQ comment is edited (issue_comment edited).
# Checks if all nitpick checkboxes are checked AND all CR threads are resolved.
# If both conditions are met and label is "coderabbit: unresolved", flips to complete.
#
# Trigger: issue_comment edited by rickcedwhat-ai on a PR, body contains nitpick section.

on:
  issue_comment:
    types: [edited]

jobs:
  nitpick-gate:
    name: Gate on nitpick checkbox completion
    runs-on: ubuntu-latest
    if: |
      github.event.comment.user.login == 'rickcedwhat-ai' &&
      github.event.issue.pull_request != null &&
      contains(github.event.comment.body, '<!-- nitpick-section-start -->')
    permissions:
      pull-requests: write
      statuses: write
    steps:
      - name: Checkout (for coderabbit-logic.mjs import)
        uses: actions/checkout@v4

      - name: Check nitpick completion and gate
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.BOT_PAT }}
          script: |
            const path = require('path');
            const { hasUncheckedNitpicks } = await import(
              `file://${path.join(process.env.GITHUB_WORKSPACE, '.github/scripts/coderabbit-logic.mjs')}`
            );

            const { owner, repo } = context.repo;
            const pr_number = context.payload.issue.number;
            const commentBody = context.payload.comment.body;

            // ── TEST GUARD: only act on PRs targeting the coderabbit branch ───
            // Remove this block when promoting to main.
            const { data: pr } = await github.rest.pulls.get({
              owner, repo, pull_number: pr_number,
            });
            const baseBranch = pr.base.ref;
            if (baseBranch !== 'coderabbit') {
              core.info(`PR #${pr_number} targets "${baseBranch}", not "coderabbit" — skipping (test guard).`);
              return;
            }

            const sha = pr.head.sha;

            // ── Check if all nitpick checkboxes are checked ───────────────────
            // If any unchecked cr-id checkbox exists → not all done
            if (hasUncheckedNitpicks(commentBody)) {
              core.info('Unchecked nitpick checkboxes remain — no action.');
              return;
            }

            core.info('All nitpick checkboxes are checked. Verifying CR threads...');

            // ── Verify all CR threads are resolved via GraphQL ────────────────
            const threadResult = await github.graphql(`
              query($owner: String!, $repo: String!, $number: Int!) {
                repository(owner: $owner, name: $repo) {
                  pullRequest(number: $number) {
                    reviewThreads(first: 100) {
                      nodes {
                        isResolved
                        path
                        line
                        originalLine
                        comments(first: 1) {
                          nodes {
                            author { login }
                            body
                          }
                        }
                      }
                    }
                  }
                }
              }
            `, { owner, repo, number: pr_number });

            const threads = threadResult.repository.pullRequest.reviewThreads.nodes;
            const openCRThreads = threads.filter(
              t => !t.isResolved && t.comments.nodes[0]?.author?.login === 'coderabbitai[bot]'
            ).length;

            core.info(`Open CR threads: ${openCRThreads}`);

            if (openCRThreads > 0) {
              core.info(`${openCRThreads} CR thread(s) still open — cannot flip to complete.`);
              return;
            }

            // ── Both conditions met — check current label ─────────────────────
            const { data: labelData } = await github.rest.issues.listLabelsOnIssue({
              owner, repo, issue_number: pr_number,
            });
            const labelNames = labelData.map(l => l.name);

            if (!labelNames.includes('coderabbit: unresolved')) {
              core.info(`Current label is not "coderabbit: unresolved" (has: ${labelNames.join(', ')}) — no action.`);
              return;
            }

            // ── Swap to complete ──────────────────────────────────────────────
            for (const l of labelNames.filter(n => n.startsWith('coderabbit:'))) {
              try {
                await github.rest.issues.removeLabel({
                  owner, repo, issue_number: pr_number, name: l,
                });
              } catch {}
            }
            await github.rest.issues.addLabels({
              owner, repo, issue_number: pr_number, labels: ['coderabbit: complete'],
            });

            await github.rest.repos.createCommitStatus({
              owner, repo, sha,
              state: 'success',
              context: 'coderabbit-review',
              description: 'CodeRabbit review passed',
            });

            core.info('All nitpicks checked + all threads resolved → coderabbit: complete');

            // ── Update HQ cr-section to "complete · no issues" ───────────────
            // The event payload IS the HQ comment — no need to re-fetch.
            const hqComment = context.payload.comment;

            if (hqComment) {
              try {
                const triggerMatch = hqComment.body.match(/<!-- cr-trigger-time: ([^>]*) -->/);
                const triggerTime = triggerMatch?.[1]?.trim() ?? '';

                const { getCheckedLabel } = await import(
                  `file://${path.join(process.env.GITHUB_WORKSPACE, '.github/scripts/coderabbit-logic.mjs')}`
                );
                const checkedLabel = getCheckedLabel(hqComment.body);

                const newCRSection = [
                  '<!-- cr-section-start -->',
                  `<!-- cr-trigger-time: ${triggerTime} -->`,
                  '',
                  '### 🔍 CodeRabbit Review',
                  checkedLabel,
                  '',
                  '> ✅ Review complete · no issues',
                  '<!-- cr-section-end -->',
                ].join('\n');

                let newBody = hqComment.body.replace(
                  /<!-- cr-section-start -->[\s\S]*?<!-- cr-section-end -->/,
                  newCRSection
                );
                // Remove the nitpick section now that everything is checked
                newBody = newBody.replace(
                  /\n?<!-- nitpick-section-start -->[\s\S]*?<!-- nitpick-section-end -->/,
                  ''
                );
                // Remove any cr-gate-note
                newBody = newBody.replace(/\n?<!-- cr-gate-note -->[\s\S]*?(?=\n\n|$)/, '');

                await github.rest.issues.updateComment({
                  owner, repo, comment_id: hqComment.id, body: newBody,
                });
                core.info('HQ comment updated to complete state.');
              } catch (err) {
                core.warning(`Could not update HQ comment: ${err.message}`);
              }
            }
