name: Bot — CR Complete

# Fires when CodeRabbit submits a formal pull_request_review.
# This is the primary completion signal — NOT human approvals and NOT
# issue comments. The formal review object arrives 5-12 minutes after
# the initial acknowledgment comment.
#
# Guards:
#   - Reviewer must be coderabbitai[bot]
#   - PR must have "coderabbit: waiting" label
#   - Review submitted_at must be >= trigger_time from HQ comment
#
# Branches (driven by CR's "Actionable comments posted: N" count, not raw state):
#   - APPROVED → complete + success
#   - 0 actionable comments (nitpicks only / nothing) → complete + success
#   - >0 actionable comments OR CHANGES_REQUESTED → unresolved + failure
#
# Nitpicks are surfaced in a count-only smoke table for visibility but never
# gate the merge — only actionable comments / threads block.

on:
  pull_request_review:
    types: [submitted]

jobs:
  complete:
    name: Handle CodeRabbit formal review
    runs-on: ubuntu-latest
    if: github.event.review.user.login == 'coderabbitai[bot]'
    permissions:
      pull-requests: write
      statuses: write
    steps:
      - name: Checkout (for coderabbit-logic.mjs import)
        uses: actions/checkout@v4

      - name: Evaluate formal review
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.BOT_PAT }}
          script: |
            const path = require('path');
            const { getCheckedLabel, parseActionableCount, parseNitpickCount } = await import(
              `file://${path.join(process.env.GITHUB_WORKSPACE, '.github/scripts/coderabbit-logic.mjs')}`
            );

            const { owner, repo } = context.repo;
            const review = context.payload.review;
            const pr_number = context.payload.pull_request.number;
            const reviewState = review.state;           // APPROVED | CHANGES_REQUESTED | COMMENTED
            const submittedAt = review.submitted_at;
            const reviewBody = review.body ?? '';

            // ── TEST GUARD: only act on PRs targeting the coderabbit branch ───
            // Remove this block when promoting to main.
            const baseBranch = context.payload.pull_request.base.ref;
            if (baseBranch !== 'coderabbit') {
              core.info(`PR #${pr_number} targets "${baseBranch}", not "coderabbit" — skipping (test guard).`);
              return;
            }

            // ── guard: PR must have "coderabbit: waiting" label ───────────────

            const { data: labels } = await github.rest.issues.listLabelsOnIssue({
              owner, repo, issue_number: pr_number,
            });
            const labelNames = labels.map(l => l.name);
            if (!labelNames.includes('coderabbit: waiting')) {
              core.info(`PR #${pr_number} does not have "coderabbit: waiting" label (has: ${labelNames.join(', ')}) — skipping.`);
              return;
            }

            // ── guard: review must be after trigger_time ──────────────────────

            const allComments = await github.paginate(github.rest.issues.listComments, {
              owner, repo, issue_number: pr_number, per_page: 100,
            });
            const hqCandidates = allComments.filter(
              c => c.user.login === 'rickcedwhat-ai' && c.body.includes('<!-- bot-hq -->')
            );
            const hqComment = hqCandidates.sort((a, b) =>
              new Date(b.updated_at) - new Date(a.updated_at)
            )[0] ?? null;

            let triggerTime = null;
            if (hqComment) {
              const m = hqComment.body.match(/<!-- cr-trigger-time: ([^>]+) -->/);
              triggerTime = m?.[1]?.trim() || null;
            }

            if (triggerTime && new Date(submittedAt) < new Date(triggerTime)) {
              core.info(`Review submitted at ${submittedAt} is before trigger_time ${triggerTime} — ignoring stale review.`);
              return;
            }

            core.info(`Processing CR formal review: state=${reviewState}, submitted=${submittedAt}`);

            // ── helpers ───────────────────────────────────────────────────────

            async function swapLabel(newLabel) {
              for (const l of labelNames.filter(n => n.startsWith('coderabbit:'))) {
                try {
                  await github.rest.issues.removeLabel({
                    owner, repo, issue_number: pr_number, name: l,
                  });
                } catch {}
              }
              await github.rest.issues.addLabels({
                owner, repo, issue_number: pr_number, labels: [newLabel],
              });
            }

            async function setStatus(state, description) {
              const sha = context.payload.pull_request.head.sha;
              await github.rest.repos.createCommitStatus({
                owner, repo, sha,
                state, context: 'coderabbit-review', description,
              });
            }

            async function updateHQComment(newBody) {
              if (!hqComment) return;
              try {
                await github.rest.issues.updateComment({
                  owner, repo, comment_id: hqComment.id, body: newBody,
                });
              } catch (err) {
                core.warning(`Could not update HQ comment: ${err.message}`);
              }
            }

            const checkedLabel = getCheckedLabel(hqComment?.body ?? '');

            // ── classify the review ───────────────────────────────────────────
            // Gate on CR's actionable-comment count (reliable, present in the
            // review body immediately) rather than the GraphQL thread count,
            // which races with GitHub materializing the threads. Nitpicks never gate.
            const isApproved = reviewState.toLowerCase() === 'approved';
            const actionableCount = parseActionableCount(reviewBody);
            const nitpickCount = parseNitpickCount(reviewBody);
            core.info(`state=${reviewState} actionable=${actionableCount} nitpicks=${nitpickCount}`);

            // ── fetch open CR inline threads (for the smoke table rows) ───────
            let inlineThreads = [];
            try {
              const threadResult = await github.graphql(`
                query($owner: String!, $repo: String!, $number: Int!) {
                  repository(owner: $owner, name: $repo) {
                    pullRequest(number: $number) {
                      reviewThreads(first: 100) {
                        nodes {
                          isResolved
                          path
                          line
                          originalLine
                          comments(first: 1) { nodes { author { login } body } }
                        }
                      }
                    }
                  }
                }
              `, { owner, repo, number: pr_number });
              inlineThreads = threadResult.repository.pullRequest.reviewThreads.nodes
                .filter(t => !t.isResolved && t.comments.nodes[0]?.author?.login === 'coderabbitai[bot]')
                .map(t => ({
                  file: t.path,
                  lines: String(t.line ?? t.originalLine ?? ''),
                  title: (t.comments.nodes[0]?.body ?? '').split('\n')[0].slice(0, 80),
                }));
            } catch (err) {
              core.warning(`Could not fetch review threads via GraphQL: ${err.message}`);
            }

            // Block only on actionable comments / open threads. Nitpicks are advisory.
            // CHANGES_REQUESTED is an explicit "not approved" signal — always block on it,
            // even if the actionable-count parse missed or threads haven't materialized yet.
            const isChangesRequested = reviewState.toLowerCase() === 'changes_requested';
            const hasBlocking = !isApproved &&
              (isChangesRequested || actionableCount > 0 || inlineThreads.length > 0);

            // ── build count-only smoke table (+ thread rows when available) ───
            let smokeTable = '';
            if (actionableCount > 0 || nitpickCount > 0 || inlineThreads.length > 0) {
              const parts = [
                `<details><summary>📊 CodeRabbit findings — ${actionableCount} actionable · ${nitpickCount} nitpick(s)</summary>`,
                '',
              ];
              if (inlineThreads.length > 0) {
                parts.push('**Open actionable threads:**', '| File | Lines | Summary |', '|---|---|---|');
                for (const t of inlineThreads) parts.push(`| \`${t.file}\` | ${t.lines} | ${t.title} |`);
                parts.push('');
              }
              if (nitpickCount > 0) {
                parts.push(`_${nitpickCount} nitpick(s) — see CodeRabbit's review summary above. Advisory; does not block merge._`, '');
              }
              parts.push('</details>');
              smokeTable = parts.join('\n');
            }

            // ── rewrite HQ cr-section (and strip any legacy nitpick checklist) ─
            async function writeCRSection(statusLine, includeTable) {
              if (!hqComment) return;
              const lines = [
                '<!-- cr-section-start -->',
                `<!-- cr-trigger-time: ${triggerTime ?? ''} -->`,
                '',
                '### 🔍 CodeRabbit Review',
                checkedLabel,
                '',
                statusLine,
              ];
              if (includeTable && smokeTable) { lines.push('', smokeTable); }
              lines.push('<!-- cr-section-end -->');
              let newBody = hqComment.body.replace(
                /<!-- cr-section-start -->[\s\S]*?<!-- cr-section-end -->/,
                lines.join('\n')
              );
              // strip any legacy nitpick checklist section left by older bot versions
              newBody = newBody.replace(
                /\n?<!-- nitpick-section-start -->[\s\S]*?<!-- nitpick-section-end -->/,
                ''
              );
              await updateHQComment(newBody);
            }

            // ── apply outcome ─────────────────────────────────────────────────
            if (!hasBlocking) {
              await swapLabel('coderabbit: complete');
              await setStatus('success', 'CodeRabbit review passed');
              const note = nitpickCount > 0
                ? `> ✅ Review complete · no blocking issues · ${nitpickCount} advisory nitpick(s)`
                : '> ✅ Review complete · no issues';
              await writeCRSection(note, nitpickCount > 0);
              core.info(`No blocking issues (approved=${isApproved}, actionable=${actionableCount}) → complete`);
              return;
            }

            await swapLabel('coderabbit: unresolved');
            await setStatus('failure', 'CodeRabbit review has actionable comments');
            await writeCRSection(
              '> ❌ Review complete · actionable comments to resolve\n' +
              '>\n' +
              "> ℹ️ After addressing them, re-trigger a review (re-check **Full review** above). " +
              "Resolving threads alone won't unblock the merge — CodeRabbit must re-review and approve.",
              true,
            );
            core.info(`${actionableCount} actionable / ${inlineThreads.length} open thread(s) → coderabbit: unresolved`);
