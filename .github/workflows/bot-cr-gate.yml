name: Bot — CR Gate

# Fires when a pull_request_review_thread is resolved or unresolved.
# Manages the unresolved ↔ complete transition based on open CR thread count.
#
# On resolved: re-count open CR threads via GraphQL.
#   If 0 open threads AND label is "coderabbit: unresolved" → swap to complete.
#
# On unresolved: if label is "coderabbit: complete" → swap back to unresolved.

on:
  pull_request_review_thread:
    types: [resolved, unresolved]

jobs:
  gate:
    name: Gate on thread resolution
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      statuses: write
    steps:
      - name: Update label based on thread state
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.BOT_PAT }}
          script: |
            const { owner, repo } = context.repo;
            const pr_number = context.payload.pull_request.number;
            const sha = context.payload.pull_request.head.sha;
            const threadAction = context.payload.action; // 'resolved' | 'unresolved'

            // ── TEST GUARD: only act on PRs targeting the coderabbit branch ───
            // Remove this block when promoting to main.
            const baseBranch = context.payload.pull_request.base.ref;
            if (baseBranch !== 'coderabbit') {
              core.info(`PR #${pr_number} targets "${baseBranch}", not "coderabbit" — skipping (test guard).`);
              return;
            }

            // Get current labels
            const { data: labelData } = await github.rest.issues.listLabelsOnIssue({
              owner, repo, issue_number: pr_number,
            });
            const labelNames = labelData.map(l => l.name);

            async function swapLabel(newLabel) {
              for (const l of labelNames.filter(n => n.startsWith('coderabbit:'))) {
                try {
                  await github.rest.issues.removeLabel({
                    owner, repo, issue_number: pr_number, name: l,
                  });
                } catch {}
              }
              await github.rest.issues.addLabels({
                owner, repo, issue_number: pr_number, labels: [newLabel],
              });
            }

            async function setStatus(state, description) {
              await github.rest.repos.createCommitStatus({
                owner, repo, sha,
                state, context: 'coderabbit-review', description,
              });
            }

            if (threadAction === 'resolved') {
              // Only act if currently unresolved
              if (!labelNames.includes('coderabbit: unresolved')) {
                core.info('Label is not "coderabbit: unresolved" — no action on resolve.');
                return;
              }

              // Count remaining open CR review threads via GraphQL
              const result = await github.graphql(`
                query($owner: String!, $repo: String!, $number: Int!) {
                  repository(owner: $owner, name: $repo) {
                    pullRequest(number: $number) {
                      reviewThreads(first: 100) {
                        nodes {
                          isResolved
                          comments(first: 1) {
                            nodes { author { login } }
                          }
                        }
                      }
                    }
                  }
                }
              `, { owner, repo, number: pr_number });

              const threads = result.repository.pullRequest.reviewThreads.nodes;
              const openCRThreads = threads.filter(
                t => !t.isResolved && t.comments.nodes[0]?.author?.login === 'coderabbitai[bot]'
              ).length;

              core.info(`Open CR threads after resolve: ${openCRThreads}`);

              if (openCRThreads === 0) {
                await swapLabel('coderabbit: complete');
                await setStatus('success', 'CodeRabbit review passed');
                core.info('All CR threads resolved → coderabbit: complete');
              }
            } else if (threadAction === 'unresolved') {
              // If a thread is re-opened while we're in "complete", revert to unresolved.
              // Only revert if the thread author is coderabbitai[bot].
              const threadAuthor = context.payload.thread?.comments?.[0]?.user?.login;
              if (threadAuthor !== 'coderabbitai[bot]') {
                core.info(`Thread author is ${threadAuthor}, not coderabbitai[bot] — no action.`);
                return;
              }

              if (!labelNames.includes('coderabbit: complete')) {
                core.info('Label is not "coderabbit: complete" — no action on unresolved.');
                return;
              }

              await swapLabel('coderabbit: unresolved');
              await setStatus('failure', 'CodeRabbit review has open comments');
              core.info('CR thread re-opened → coderabbit: unresolved');
            }
