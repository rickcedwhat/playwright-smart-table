name: Bot — CR Watch

# Fires on every issue_comment from coderabbitai[bot], created OR edited.
# CR communicates rate-limit state by EDITING its existing summary comment
# (not by posting a new one), so we must listen for `edited` too.
#
# Guards: PR must have "coderabbit: waiting" label AND the comment's effective
# timestamp (updated_at) must be after the trigger_time stored in the HQ comment
# (prevents stale comments posted at PR open from being misinterpreted as
# responses to the current review request).
#
# Branches:
#   - Skip detected → complete
#   - Rate-limit detected → re-queued via coordinator (no per-PR retry)
#   - Any other CR comment → no action

on:
  issue_comment:
    types: [created, edited]

jobs:
  watch:
    name: Watch for CodeRabbit response
    runs-on: ubuntu-latest
    if: |
      github.event.comment.user.login == 'coderabbitai[bot]' &&
      github.event.issue.pull_request != null
    permissions:
      pull-requests: write
      issues: write
      statuses: write
    steps:
      - name: Checkout (for coderabbit-logic.mjs and bot-queue.mjs import)
        uses: actions/checkout@v4

      - name: Evaluate CR comment
        uses: actions/github-script@v7
        env:
          QSTASH_TOKEN: ${{ secrets.QSTASH_TOKEN }}
          BOT_PAT: ${{ secrets.BOT_PAT }}
        with:
          github-token: ${{ secrets.BOT_PAT }}
          script: |
            const path = require('path');
            const {
              isSkipComment,
              isRateLimitComment,
              computeRateLimitDelay,
              getCheckedLabel,
            } = await import(
              `file://${path.join(process.env.GITHUB_WORKSPACE, '.github/scripts/coderabbit-logic.mjs')}`
            );
            const {
              parseQueueState,
              computeActualTokens,
              enqueue,
              findPRInQueues,
              serializeQueueState,
              getPriorityFromCheckbox,
            } = await import(
              `file://${path.join(process.env.GITHUB_WORKSPACE, '.github/scripts/bot-queue.mjs')}`
            );

            const { owner, repo } = context.repo;
            const pr_number = context.issue.number;
            const comment = context.payload.comment;
            const commentBody = comment.body || '';
            // Effective timestamp: for an edit, updated_at is when CR changed the
            // comment (e.g. flipped it to rate-limited). For a fresh create,
            // updated_at === created_at. Either way this is the moment that matters.
            const commentEffectiveAt = comment.updated_at ?? comment.created_at;
            const nowMs = Date.now();
            const nowIso = new Date(nowMs).toISOString();

            // ── fetch PR data ─────────────────────────────────────────────────

            const { data: prData } = await github.rest.pulls.get({
              owner, repo, pull_number: pr_number,
            });

            // ── guard: PR must have "coderabbit: waiting" label ───────────────

            const { data: labels } = await github.rest.issues.listLabelsOnIssue({
              owner, repo, issue_number: pr_number,
            });
            const labelNames = labels.map(l => l.name);
            if (!labelNames.includes('coderabbit: waiting')) {
              core.info('PR does not have "coderabbit: waiting" label — skipping.');
              return;
            }

            // ── guard: comment must be after trigger_time ─────────────────────

            const allComments = await github.paginate(github.rest.issues.listComments, {
              owner, repo, issue_number: pr_number, per_page: 100,
            });
            const hqComment = allComments.find(
              c => c.user.login === 'rickcedwhat-ai' && c.body.includes('<!-- bot-hq -->')
            );

            let triggerTime = null;
            if (hqComment) {
              const m = hqComment.body.match(/<!-- cr-trigger-time: ([^>]+) -->/);
              triggerTime = m?.[1]?.trim() || null;
            }

            if (triggerTime && new Date(commentEffectiveAt) < new Date(triggerTime)) {
              core.info(`Comment effective at ${commentEffectiveAt} is before trigger_time ${triggerTime} — ignoring stale comment.`);
              return;
            }

            // ── helpers ───────────────────────────────────────────────────────

            async function swapLabel(newLabel) {
              for (const l of labelNames.filter(n => n.startsWith('coderabbit:'))) {
                try {
                  await github.rest.issues.removeLabel({
                    owner, repo, issue_number: pr_number, name: l,
                  });
                } catch {}
              }
              await github.rest.issues.addLabels({
                owner, repo, issue_number: pr_number, labels: [newLabel],
              });
            }

            async function setStatus(state, description) {
              const { data: pr } = await github.rest.pulls.get({
                owner, repo, pull_number: pr_number,
              });
              await github.rest.repos.createCommitStatus({
                owner, repo, sha: pr.head.sha,
                state, context: 'coderabbit-review', description,
              });
            }

            async function updateHQCRSection(newCRSection) {
              if (!hqComment) return;
              try {
                const updatedBody = hqComment.body.replace(
                  /<!-- cr-section-start -->[\s\S]*?<!-- cr-section-end -->/,
                  newCRSection
                );
                await github.rest.issues.updateComment({
                  owner, repo, comment_id: hqComment.id, body: updatedBody,
                });
              } catch (err) {
                core.warning(`Could not update HQ comment: ${err.message}`);
              }
            }

            const checkedLabel = getCheckedLabel(hqComment?.body ?? '');

            // ── branch: skip detected ─────────────────────────────────────────

            if (isSkipComment(commentBody)) {
              core.info('Skip comment detected — marking complete.');
              await swapLabel('coderabbit: complete');
              await setStatus('success', 'CodeRabbit review passed (skipped)');
              await updateHQCRSection([
                '<!-- cr-section-start -->',
                `<!-- cr-trigger-time: ${triggerTime ?? ''} -->`,
                '',
                '### 🔍 CodeRabbit Review',
                checkedLabel,
                '',
                '> ✅ Review complete · skipped (no changes to review)',
                '<!-- cr-section-end -->',
              ].join('\n'));
              return;
            }

            // ── branch: rate-limit detected ───────────────────────────────────

            if (isRateLimitComment(commentBody)) {
              core.info('Rate-limit comment detected — re-queuing PR via coordinator.');

              // Parse delay for QStash scheduling
              const anchorIso = commentEffectiveAt;
              const delaySecs = computeRateLimitDelay(commentBody, anchorIso, nowMs);

              // Determine priority level from HQ checkbox state
              const hqPriority = getPriorityFromCheckbox(hqComment?.body ?? '');
              const requeueLevel = hqPriority ?? 'normal';

              // Find Queue Issue and update state
              const allIssues = await github.paginate(github.rest.issues.listForRepo, {
                owner, repo, state: 'open', per_page: 100,
              });
              const queueIssue = allIssues.find(i => i.title === '🐰 CodeRabbit Review Queue');

              let state = queueIssue ? parseQueueState(queueIssue.body) : {
                tokens: 3, last_decremented_at: '', refill_qstash_id: '', refill_at: '',
                priority: [], normal: [], backburner: [],
              };
              state = computeActualTokens(state, nowMs);

              // Note: rate-limit = no token burn — don't decrement
              // Re-queue at front of its tier (unshift equivalent — use priority which unshifts)
              // For re-queuing we use a special approach: remove from queue first then re-add at front
              state = {
                ...state,
                priority: state.priority.filter(item => item.pr !== pr_number),
                normal: state.normal.filter(item => item.pr !== pr_number),
                backburner: state.backburner.filter(item => item.pr !== pr_number),
              };

              // Re-add at front of its level queue
              const requeueItem = {
                pr: pr_number,
                title: prData.title,
                queued_at: nowIso,
              };
              if (requeueLevel === 'priority') {
                state = { ...state, priority: [requeueItem, ...state.priority] };
              } else if (requeueLevel === 'backburner') {
                state = { ...state, backburner: [requeueItem, ...state.backburner] };
              } else {
                state = { ...state, normal: [requeueItem, ...state.normal] };
              }

              const posInfo = findPRInQueues(state, pr_number);

              // Set label to queued
              await swapLabel('coderabbit: queued');
              await setStatus('pending', 'CodeRabbit rate-limited · re-queued');

              // Schedule QStash coordinator if no active one or refill_at is past
              const refillIsPast = state.refill_at
                ? new Date(state.refill_at).getTime() <= nowMs
                : true;

              let qstashId = state.refill_qstash_id;
              let refillAt = state.refill_at;

              if (!state.refill_qstash_id || refillIsPast) {
                try {
                  const qstashUrl = `https://qstash.upstash.io/v2/publish/https://api.github.com/repos/${owner}/${repo}/dispatches`;
                  const qRes = await fetch(qstashUrl, {
                    method: 'POST',
                    headers: {
                      'Authorization': `Bearer ${process.env.QSTASH_TOKEN}`,
                      'Upstash-Delay': `${delaySecs}s`,
                      'Upstash-Forward-Authorization': `Bearer ${process.env.BOT_PAT}`,
                      'Upstash-Forward-Content-Type': 'application/json',
                      'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ event_type: 'bot-cr-coordinator' }),
                  });
                  const qBody = await qRes.json();
                  qstashId = qBody.messageId ?? '';
                  refillAt = new Date(nowMs + delaySecs * 1_000).toISOString();
                  if (!qRes.ok) core.warning(`QStash returned HTTP ${qRes.status}: ${JSON.stringify(qBody)}`);
                  else core.info(`QStash coordinator scheduled in ${delaySecs}s: ${qstashId}`);
                } catch (err) {
                  core.warning(`QStash publish failed: ${err.message}`);
                }
              }

              state.refill_qstash_id = qstashId ?? '';
              state.refill_at = refillAt ?? '';

              // Use actual scheduled fire time (refillAt) rather than nowMs+delaySecs
              // so the HQ comment shows the real coordinator wake time.
              const retryAt = refillAt
                ? new Date(refillAt).toISOString().slice(11, 16)
                : new Date(nowMs + delaySecs * 1_000).toISOString().slice(11, 16);
              const posStr = posInfo ? `position ${posInfo.position}` : 'queued';

              await updateHQCRSection([
                '<!-- cr-section-start -->',
                `<!-- cr-trigger-time: ${triggerTime ?? ''} -->`,
                '',
                '### 🔍 CodeRabbit Review',
                checkedLabel,
                '',
                `> ⏱ Rate-limited · re-queued at ${posStr} · coordinator fires ~${retryAt} UTC`,
                '<!-- cr-section-end -->',
              ].join('\n'));

              // Write state back
              if (queueIssue) {
                await github.rest.issues.update({
                  owner, repo, issue_number: queueIssue.number,
                  body: serializeQueueState(state),
                });
              }

              return;
            }

            // ── any other CR comment (walkthrough, ack, etc.) — no action ─────

            core.info('CR comment is not a skip or rate-limit — ignoring.');
