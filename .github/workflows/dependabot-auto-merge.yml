# Dependabot PRs: enable auto-merge (squash) for non-major bumps.
# CODEOWNERS / review bypass: ruleset Dependabot bypass — see .github/DEPENDABOT.md
name: "Auto-merge Dependabot non-major updates"

on:
  pull_request_target:
    types: [opened, reopened, synchronize, labeled]

jobs:
  enable-automerge:
    runs-on: ubuntu-latest
    if: github.event.pull_request.user.login == 'dependabot[bot]'
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Check for major version bumps
        id: check-major
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
            });
            const body = pr.data.body || '';
            const regex = /from\s+([0-9]+)\.([0-9]+)\.([0-9]+)[^\n]*to\s+([0-9]+)\.([0-9]+)\.([0-9]+)/ig;
            let m;
            let foundMatch = false;
            while ((m = regex.exec(body)) !== null) {
              foundMatch = true;
              const fromMajor = parseInt(m[1], 10);
              const toMajor = parseInt(m[4], 10);
              if (toMajor > fromMajor) {
                core.setFailed(`Contains a major version bump: ${m[0]}`);
              }
            }
            if (!foundMatch) {
              core.setFailed('No version bump patterns found in PR body — Dependabot format may have changed');
            }

      - name: Enable auto-merge for Dependabot PR (squash)
        uses: peter-evans/enable-pull-request-automerge@v3
        if: steps.check-major.conclusion == 'success'
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          pull-request-number: ${{ github.event.pull_request.number }}
          merge-method: squash
