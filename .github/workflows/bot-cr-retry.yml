name: Bot — CR Retry

# Fires via repository_dispatch when QStash delivers a scheduled retry
# after a CodeRabbit rate-limit window has expired.
#
# Payload: { pr_number, repo, review_type }
#
# Guard: PR must still have "coderabbit: rate-limited" label.
# If the label has changed (manual override, etc.) we skip silently.

on:
  repository_dispatch:
    types: [bot-coderabbit-retry]

jobs:
  retry:
    name: Retry CodeRabbit review after rate limit
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      statuses: write
    steps:
      - name: Checkout (for coderabbit-logic.mjs import)
        uses: actions/checkout@v4

      - name: Execute retry
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.BOT_PAT }}
          script: |
            const path = require('path');
            const { getCheckedLabel } = await import(
              `file://${path.join(process.env.GITHUB_WORKSPACE, '.github/scripts/coderabbit-logic.mjs')}`
            );

            const { pr_number, repo, review_type } = context.payload.client_payload;
            const [owner, repoName] = repo.split('/');

            // ── TEST GUARD: only act on PRs targeting the coderabbit branch ───
            // Remove this block when promoting to main.
            const { data: prCheck } = await github.rest.pulls.get({
              owner, repo: repoName, pull_number: pr_number,
            });
            if (prCheck.base.ref !== 'coderabbit') {
              core.info(`PR #${pr_number} targets "${prCheck.base.ref}", not "coderabbit" — skipping (test guard).`);
              return;
            }

            // ── guard: must still be rate-limited ─────────────────────────────

            const { data: labels } = await github.rest.issues.listLabelsOnIssue({
              owner, repo: repoName, issue_number: pr_number,
            });
            const labelNames = labels.map(l => l.name);
            if (!labelNames.includes('coderabbit: rate-limited')) {
              core.info(`PR #${pr_number} is no longer rate-limited (labels: ${labelNames.join(', ')}) — skipping retry.`);
              return;
            }

            // ── find HQ comment ───────────────────────────────────────────────

            const allComments = await github.paginate(github.rest.issues.listComments, {
              owner, repo: repoName, issue_number: pr_number, per_page: 100,
            });
            const hqComment = allComments.find(
              c => c.user.login === 'rickcedwhat-ai' && c.body.includes('<!-- bot-hq -->')
            );

            // ── swap label to waiting (before posting, to prevent duplicate QStash races) ─

            for (const l of labelNames.filter(n => n.startsWith('coderabbit:'))) {
              try {
                await github.rest.issues.removeLabel({
                  owner, repo: repoName, issue_number: pr_number, name: l,
                });
              } catch {}
            }
            await github.rest.issues.addLabels({
              owner, repo: repoName, issue_number: pr_number, labels: ['coderabbit: waiting'],
            });

            // ── post @coderabbitai command ────────────────────────────────────

            const crCommand = review_type === 'full'
              ? '@coderabbitai full review'
              : '@coderabbitai review';

            await github.rest.issues.createComment({
              owner, repo: repoName, issue_number: pr_number, body: crCommand,
            });

            // ── update trigger_time in HQ comment ────────────────────────────

            const triggerTime = new Date().toISOString();
            const triggerHHMM = triggerTime.slice(11, 16);

            const checkedLabel = getCheckedLabel(hqComment?.body ?? '');

            const newCRSection = [
              '<!-- cr-section-start -->',
              `<!-- cr-trigger-time: ${triggerTime} -->`,
              '',
              '### 🔍 CodeRabbit Review',
              checkedLabel,
              '',
              `> ⏳ Waiting for CodeRabbit… _(retried at ${triggerHHMM} UTC after rate limit)_`,
              '<!-- cr-section-end -->',
            ].join('\n');

            if (hqComment) {
              try {
                const updatedBody = hqComment.body.replace(
                  /<!-- cr-section-start -->[\s\S]*?<!-- cr-section-end -->/,
                  newCRSection
                );
                await github.rest.issues.updateComment({
                  owner, repo: repoName, comment_id: hqComment.id, body: updatedBody,
                });
              } catch (err) {
                core.warning(`Could not update HQ comment: ${err.message}`);
              }
            }

            // ── set commit status pending ─────────────────────────────────────
            // Reuse prCheck fetched earlier for the test guard — no extra API call needed.
            await github.rest.repos.createCommitStatus({
              owner, repo: repoName, sha: prCheck.head.sha,
              state: 'pending',
              context: 'coderabbit-review',
              description: 'CodeRabbit review in progress',
            });

            core.info(`Retry posted "${crCommand}" for PR #${pr_number}, trigger_time=${triggerTime}`);
