name: Bot Receiver

# Handles delayed actions delivered by QStash via repository_dispatch.
# QStash calls the GitHub dispatches API directly after the configured delay.

on:
  repository_dispatch:
    types:
      - bot-coderabbit-retry
      - bot-coderabbit-trigger
      - bot-coderabbit-check
      - bot-upstream-check
      - bot-upstream-nudge
      - bot-dependabot-rebase
      - bot-reminder

jobs:
  # ── coderabbit retry ───────────────────────────────────────────────────────
  coderabbit-retry:
    name: Post CodeRabbit review
    runs-on: ubuntu-latest
    if: github.event.action == 'bot-coderabbit-retry'
    steps:
      - name: Post @coderabbitai full review
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.BOT_PAT }}
          script: |
            const { pr_number, repo } = context.payload.client_payload;
            const [owner, repoName] = repo.split('/');
            await github.rest.issues.createComment({
              owner,
              repo: repoName,
              issue_number: pr_number,
              body: '@coderabbitai full review'
            });

  # ── coderabbit trigger ─────────────────────────────────────────────────────
  coderabbit-trigger:
    name: Trigger CodeRabbit review
    runs-on: ubuntu-latest
    if: github.event.action == 'bot-coderabbit-trigger'
    steps:
      - name: Check attempt limit
        id: check-attempt
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.BOT_PAT }}
          script: |
            const { pr_number, repo, attempt, hq_comment_id } = context.payload.client_payload;
            const [owner, repoName] = repo.split('/');

            async function updateHQCRSection(hq_comment_id, statusText) {
              if (!hq_comment_id) return;
              try {
                const { data: hqComment } = await github.rest.issues.getComment({
                  owner, repo: repoName, comment_id: hq_comment_id
                });
                const isChecked = /- \[x\] Request review/i.test(hqComment.body);
                const newContent = [
                  '### 🔍 CodeRabbit Review',
                  isChecked ? '- [x] Request review' : '- [ ] Request review',
                  '',
                  `> ${statusText}`,
                ].join('\n');
                const s = '<!-- bot-hq:coderabbit -->';
                const e = '<!-- /bot-hq:coderabbit -->';
                const updated = hqComment.body.replace(new RegExp(`${s}[\\s\\S]*?${e}`), `${s}\n${newContent}\n${e}`);
                await github.rest.issues.updateComment({
                  owner, repo: repoName, comment_id: hq_comment_id, body: updated
                });
              } catch (err) {
                core.warning(`Could not update HQ comment: ${err.message}`);
              }
            }

            if (attempt > 10) {
              await github.rest.issues.createComment({
                owner, repo: repoName, issue_number: pr_number,
                body: '❌ CodeRabbit review failed after 10 attempts. Please trigger manually.'
              });
              await updateHQCRSection(hq_comment_id, '❌ Review failed after 10 attempts — please trigger manually');
              // Swap label back to not started
              const { data: labels } = await github.rest.issues.listLabelsOnIssue({
                owner, repo: repoName, issue_number: pr_number
              });
              for (const l of labels.filter(l => l.name.startsWith('coderabbit:'))) {
                try {
                  await github.rest.issues.removeLabel({
                    owner, repo: repoName, issue_number: pr_number, name: l.name
                  });
                } catch {}
              }
              await github.rest.issues.addLabels({
                owner, repo: repoName, issue_number: pr_number,
                labels: ['coderabbit: not started']
              });
              core.setOutput('stop', 'true');
            } else {
              core.setOutput('stop', 'false');
            }

      - name: Swap label to waiting
        if: steps.check-attempt.outputs.stop != 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.BOT_PAT }}
          script: |
            const { pr_number, repo } = context.payload.client_payload;
            const [owner, repoName] = repo.split('/');
            const { data: labels } = await github.rest.issues.listLabelsOnIssue({
              owner, repo: repoName, issue_number: pr_number
            });
            // Skip if already waiting — bot-listener may have already set this label
            const crLabels = labels.filter(l => l.name.startsWith('coderabbit:'));
            if (crLabels.length === 1 && crLabels[0].name === 'coderabbit: waiting') return;
            for (const l of crLabels) {
              try {
                await github.rest.issues.removeLabel({
                  owner, repo: repoName, issue_number: pr_number, name: l.name
                });
              } catch {}
            }
            await github.rest.issues.addLabels({
              owner, repo: repoName, issue_number: pr_number,
              labels: ['coderabbit: waiting']
            });

      - name: Post @coderabbitai full review and record timestamp
        id: post-review
        if: steps.check-attempt.outputs.stop != 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.BOT_PAT }}
          script: |
            const { pr_number, repo, attempt, hq_comment_id } = context.payload.client_payload;
            const [owner, repoName] = repo.split('/');
            const { data: comment } = await github.rest.issues.createComment({
              owner, repo: repoName, issue_number: pr_number,
              body: '@coderabbitai full review'
            });
            core.setOutput('trigger_time', comment.created_at);
            // Update HQ coderabbit section to show we're waiting
            if (hq_comment_id) {
              try {
                const { data: hqComment } = await github.rest.issues.getComment({
                  owner, repo: repoName, comment_id: hq_comment_id
                });
                const newContent = [
                  '### 🔍 CodeRabbit Review',
                  '- [x] Request review',
                  '',
                  `> ⏳ Waiting for CodeRabbit response... _(attempt ${attempt})_`,
                ].join('\n');
                const s = '<!-- bot-hq:coderabbit -->';
                const e = '<!-- /bot-hq:coderabbit -->';
                const updated = hqComment.body.replace(new RegExp(`${s}[\\s\\S]*?${e}`), `${s}\n${newContent}\n${e}`);
                await github.rest.issues.updateComment({
                  owner, repo: repoName, comment_id: hq_comment_id, body: updated
                });
              } catch (e) {
                core.warning(`Could not update HQ comment: ${e.message}`);
              }
            }

      - name: Enqueue bot-coderabbit-check via QStash (180s delay)
        if: steps.check-attempt.outputs.stop != 'true'
        env:
          QSTASH_TOKEN:      ${{ secrets.QSTASH_TOKEN }}
          BOT_PAT:           ${{ secrets.BOT_PAT }}
          PR_NUMBER:      ${{ github.event.client_payload.pr_number }}
          REPO:           ${{ github.event.client_payload.repo }}
          ATTEMPT:        ${{ github.event.client_payload.attempt }}
          TRIGGER_TIME:   ${{ steps.post-review.outputs.trigger_time }}
          HQ_COMMENT_ID:  ${{ github.event.client_payload.hq_comment_id }}
        run: |
          PAYLOAD=$(node -e "console.log(JSON.stringify({
            event_type: 'bot-coderabbit-check',
            client_payload: {
              pr_number: parseInt(process.env.PR_NUMBER),
              repo: process.env.REPO,
              attempt: parseInt(process.env.ATTEMPT),
              trigger_time: process.env.TRIGGER_TIME,
              wait_count: 0,
              hq_comment_id: (() => { const v = process.env.HQ_COMMENT_ID?.trim(); return v && v !== 'null' && v !== 'undefined' ? parseInt(v, 10) : undefined; })()
            }
          }))")
          DISPATCH_URL="https://api.github.com/repos/$REPO/dispatches"
          HTTP_CODE=$(curl -s -o /tmp/qstash-response.json -w "%{http_code}" -X POST \
            "https://qstash.upstash.io/v2/publish/$DISPATCH_URL" \
            -H "Authorization: Bearer $QSTASH_TOKEN" \
            -H "Upstash-Delay: 180s" \
            -H "Upstash-Forward-Authorization: Bearer $BOT_PAT" \
            -H "Upstash-Forward-Content-Type: application/json" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")
          echo "QStash response ($HTTP_CODE): $(cat /tmp/qstash-response.json)"
          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "QStash enqueue failed with HTTP $HTTP_CODE"
            exit 1
          fi

  # ── coderabbit check ───────────────────────────────────────────────────────
  coderabbit-check:
    name: Check CodeRabbit response
    runs-on: ubuntu-latest
    if: github.event.action == 'bot-coderabbit-check'
    steps:
      - name: Inspect CodeRabbit response and act
        uses: actions/github-script@v7
        env:
          QSTASH_TOKEN: ${{ secrets.QSTASH_TOKEN }}
          BOT_PAT:      ${{ secrets.BOT_PAT }}
        with:
          github-token: ${{ secrets.BOT_PAT }}
          script: |
            const { pr_number, repo, attempt, trigger_time, wait_count = 0, hq_comment_id } =
              context.payload.client_payload;
            const [owner, repoName] = repo.split('/');

            // Helper: swap label
            async function swapLabel(newLabel) {
              const { data: labels } = await github.rest.issues.listLabelsOnIssue({
                owner, repo: repoName, issue_number: pr_number
              });
              for (const l of labels.filter(l => l.name.startsWith('coderabbit:'))) {
                try {
                  await github.rest.issues.removeLabel({
                    owner, repo: repoName, issue_number: pr_number, name: l.name
                  });
                } catch {}
              }
              await github.rest.issues.addLabels({
                owner, repo: repoName, issue_number: pr_number, labels: [newLabel]
              });
            }

            // Helper: post commit status
            async function postStatus(state, description) {
              const { data: pr } = await github.rest.pulls.get({
                owner, repo: repoName, pull_number: pr_number
              });
              await github.rest.repos.createCommitStatus({
                owner, repo: repoName, sha: pr.head.sha,
                state, context: 'coderabbit-review', description
              });
            }

            // Helper: update the coderabbit section of the HQ comment (no-op if no hq_comment_id)
            async function updateStatus(statusText) {
              if (!hq_comment_id) return;
              try {
                const { data: hqComment } = await github.rest.issues.getComment({
                  owner, repo: repoName, comment_id: hq_comment_id
                });
                const isChecked = /- \[x\] Request review/i.test(hqComment.body);
                const newContent = [
                  '### 🔍 CodeRabbit Review',
                  isChecked ? '- [x] Request review' : '- [ ] Request review',
                  '',
                  `> ${statusText}`,
                ].join('\n');
                const s = '<!-- bot-hq:coderabbit -->';
                const e = '<!-- /bot-hq:coderabbit -->';
                const updated = hqComment.body.replace(new RegExp(`${s}[\\s\\S]*?${e}`), `${s}\n${newContent}\n${e}`);
                await github.rest.issues.updateComment({
                  owner, repo: repoName, comment_id: hq_comment_id, body: updated
                });
              } catch (e) {
                core.warning(`Could not update HQ comment: ${e.message}`);
              }
            }

            // Helper: enqueue QStash
            async function enqueue(event_type, payload, delaySecs) {
              const dispatchUrl = `https://api.github.com/repos/${repo}/dispatches`;
              const body = JSON.stringify({ event_type, client_payload: payload });
              const headers = [
                `-H "Authorization: Bearer ${process.env.QSTASH_TOKEN}"`,
                `-H "Upstash-Forward-Authorization: Bearer ${process.env.BOT_PAT}"`,
                `-H "Upstash-Forward-Content-Type: application/json"`,
                `-H "Content-Type: application/json"`,
                delaySecs > 0 ? `-H "Upstash-Delay: ${delaySecs}s"` : ''
              ].filter(Boolean).join(' ');
              // We'll use exec for this — but in github-script we use child_process
              const { execSync } = require('child_process');
              const cmd = `curl -s -o /tmp/qs.json -w "%{http_code}" -X POST ` +
                `"https://qstash.upstash.io/v2/publish/${dispatchUrl}" ` +
                `${headers} -d '${body.replace(/'/g, "'\\''")}'`;
              const code = execSync(cmd).toString().trim();
              if (parseInt(code) < 200 || parseInt(code) >= 300) {
                throw new Error(`QStash failed HTTP ${code}`);
              }
            }

            // Helper: drain the coderabbit review queue — fires the oldest queued PR
            async function drainQueue() {
              try {
                const { data: queuedIssues } = await github.rest.issues.listForRepo({
                  owner, repo: repoName,
                  state: 'open',
                  labels: 'coderabbit: queued',
                  per_page: 100,
                  sort: 'created',
                  direction: 'asc',
                });
                const nextPR = queuedIssues.find(i => i.pull_request);
                if (!nextPR) return;

                const nextNum = nextPR.number;

                // Swap queued → waiting
                try {
                  await github.rest.issues.removeLabel({
                    owner, repo: repoName, issue_number: nextNum, name: 'coderabbit: queued'
                  });
                } catch {}
                await github.rest.issues.addLabels({
                  owner, repo: repoName, issue_number: nextNum, labels: ['coderabbit: waiting']
                });

                // Find HQ comment
                const nextComments = await github.paginate(github.rest.issues.listComments, {
                  owner, repo: repoName, issue_number: nextNum, per_page: 100
                });
                const nextHQ = nextComments.find(
                  c => c.user.login === 'rickcedwhat-ai' && c.body.includes('<!-- bot-hq -->')
                );
                const nextHQId = nextHQ?.id ?? null;

                // Update HQ section to triggered
                if (nextHQ) {
                  const triggeredContent = [
                    '### 🔍 CodeRabbit Review',
                    '- [x] Request review',
                    '',
                    '> 🔄 Review triggered — waiting for CodeRabbit...',
                  ].join('\n');
                  const s = '<!-- bot-hq:coderabbit -->';
                  const e = '<!-- /bot-hq:coderabbit -->';
                  const updated = nextHQ.body.replace(
                    new RegExp(`${s}[\\s\\S]*?${e}`),
                    `${s}\n${triggeredContent}\n${e}`
                  );
                  try {
                    await github.rest.issues.updateComment({
                      owner, repo: repoName, comment_id: nextHQId, body: updated
                    });
                  } catch {}
                }

                // Dispatch trigger directly (no QStash needed — we're already async)
                await github.rest.repos.createDispatchEvent({
                  owner, repo: repoName,
                  event_type: 'bot-coderabbit-trigger',
                  client_payload: {
                    pr_number: nextNum,
                    repo: `${owner}/${repoName}`,
                    attempt: 1,
                    hq_comment_id: nextHQId
                  }
                });
                core.info(`Queue drained: triggered review for PR #${nextNum}`);
              } catch (err) {
                core.warning(`drainQueue failed: ${err.message}`);
              }
            }

            // Fetch CodeRabbit comments posted after trigger_time
            const triggerDate = new Date(trigger_time);
            const { data: allComments } = await github.rest.issues.listComments({
              owner, repo: repoName, issue_number: pr_number, per_page: 100
            });
            const isCR = (login) => login?.startsWith('coderabbitai') ?? false;
            const crComments = allComments.filter(c =>
              isCR(c.user.login) &&
              (new Date(c.created_at) > triggerDate || new Date(c.updated_at) > triggerDate) &&
              !/Full review triggered/.test(c.body)  // exclude trigger acknowledgments — they are never actionable
            );

            if (crComments.length === 0) {
              // No response yet — wait up to 5 times then re-trigger
              if (wait_count < 5) {
                await enqueue('bot-coderabbit-check', {
                  pr_number, repo, attempt, trigger_time, wait_count: wait_count + 1, hq_comment_id
                }, 60);
                await updateStatus(`⏳ Waiting for CodeRabbit response... _(check ${wait_count + 1}/5)_`);
              } else {
                await enqueue('bot-coderabbit-trigger', {
                  pr_number, repo, attempt: attempt + 1, hq_comment_id
                }, 0);
                await updateStatus(`🔄 Re-triggering CodeRabbit review _(attempt ${attempt + 1})_`);
              }
              return;
            }

            // Check for rate-limit message
            const rateLimitComment = crComments.find(
              c => /rate.?limit/i.test(c.body)
            );
            if (rateLimitComment) {
              await swapLabel('coderabbit: rate-limited');
              await postStatus('pending', 'CodeRabbit rate-limited — retry queued');

              // Parse duration from message
              const durationMatch = rateLimitComment.body.match(/(\d+)\s*(minute|min|hour)/i);
              let delaySecs = 30 * 60; // default 30 minutes
              if (durationMatch) {
                const val = parseInt(durationMatch[1]);
                const unit = durationMatch[2].toLowerCase();
                delaySecs = unit.startsWith('hour') ? val * 3600 : val * 60;
              }
              // Add 1 minute buffer
              delaySecs += 60;

              await enqueue('bot-coderabbit-trigger', {
                pr_number, repo, attempt: attempt + 1, hq_comment_id
              }, delaySecs);
              await updateStatus(`⚠️ Rate limited — retrying in ~${Math.round(delaySecs / 60)}m`);
              return;
            }

            // Check for review completion (Summary or walkthrough sections)
            const reviewComment = crComments.find(
              c => /## Summary|walkthrough/i.test(c.body) && c.body.length > 500
            );
            if (reviewComment) {
              // Check unresolved CodeRabbit threads via GraphQL (REST listReviewComments
              // does not expose thread resolution state).
              // Also fetch formal reviews: CR posts nitpick-level content in the review
              // body (state: COMMENTED) rather than as resolvable threads.
              const gqlResult = await github.graphql(`
                query($owner: String!, $repo: String!, $number: Int!) {
                  repository(owner: $owner, name: $repo) {
                    pullRequest(number: $number) {
                      reviewThreads(first: 100) {
                        nodes {
                          isResolved
                          comments(first: 1) {
                            nodes { author { login } }
                          }
                        }
                      }
                      reviews(last: 50) {
                        nodes {
                          author { login }
                          state
                          submittedAt
                          body
                        }
                      }
                    }
                  }
                }
              `, { owner, repo: repoName, number: pr_number });

              const pr = gqlResult.repository.pullRequest;
              const unresolvedCR = pr.reviewThreads.nodes.filter(
                t => !t.isResolved && isCR(t.comments.nodes[0]?.author?.login)
              );

              const triggerDate = new Date(trigger_time);
              const crNitpickReviews = pr.reviews.nodes.filter(
                r => isCR(r.author?.login) &&
                     r.state === 'COMMENTED' &&
                     new Date(r.submittedAt) > triggerDate &&
                     r.body.trim().length > 0
              );

              if (unresolvedCR.length > 0 || crNitpickReviews.length > 0) {
                const detail = unresolvedCR.length > 0
                  ? `${unresolvedCR.length} unresolved thread${unresolvedCR.length > 1 ? 's remain' : ' remains'}`
                  : 'nitpick comments';
                await swapLabel('coderabbit: unresolved');
                await postStatus('failure', 'CodeRabbit has unresolved comments');
                await updateStatus(`⚠️ Review complete — ${detail}`);
              } else {
                await swapLabel('coderabbit: complete');
                await postStatus('success', 'CodeRabbit review complete');
                await updateStatus('✅ No actionable comments — review complete');
              }
              await drainQueue();
              return;
            }

            // Response found but not clearly a review yet — wait one more cycle
            if (wait_count < 5) {
              await enqueue('bot-coderabbit-check', {
                pr_number, repo, attempt, trigger_time, wait_count: wait_count + 1, hq_comment_id
              }, 60);
              await updateStatus(`⏳ Waiting for CodeRabbit response... _(check ${wait_count + 1}/5)_`);
            } else {
              await enqueue('bot-coderabbit-trigger', {
                pr_number, repo, attempt: attempt + 1, hq_comment_id
              }, 0);
              await updateStatus(`🔄 Re-triggering CodeRabbit review _(attempt ${attempt + 1})_`);
            }

  # ── upstream check (scheduled) ─────────────────────────────────────────────
  upstream-check:
    name: Run scheduled upstream check
    runs-on: ubuntu-latest
    if: github.event.action == 'bot-upstream-check'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Prepare single-issue input
        env:
          GH_TOKEN: ${{ secrets.BOT_PAT }}
          ISSUE_NUMBER: ${{ github.event.client_payload.issue_number }}
        run: |
          gh issue view "$ISSUE_NUMBER" --json number,body,title > /tmp/single.json
          node -e "
            const d = require('/tmp/single.json');
            require('fs').writeFileSync('issues.json', JSON.stringify([d]));
          "
      - name: Run check
        env:
          GH_TOKEN: ${{ secrets.BOT_PAT }}
        run: node scripts/check-upstream-blockers.mjs

  # ── upstream nudge (48h after cleared) ────────────────────────────────────
  upstream-nudge:
    name: Post upstream nudge
    runs-on: ubuntu-latest
    if: github.event.action == 'bot-upstream-nudge'
    steps:
      - name: Check if still unstarted and nudge
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.BOT_PAT }}
          script: |
            const { issue_number, blocked_pr, repo } = context.payload.client_payload;
            const [owner, repoName] = repo.split('/');

            // Only nudge if the issue is still open
            const { data: issue } = await github.rest.issues.get({
              owner, repo: repoName, issue_number
            });
            if (issue.state !== 'open') return;

            const prRef = blocked_pr ? ` (PR #${blocked_pr})` : '';
            await github.rest.issues.createComment({
              owner, repo: repoName, issue_number,
              body: `⏰ Reminder: the upstream blocker for this issue was cleared 48 hours ago${prRef} — ready to start?`
            });

  # ── dependabot rebase ──────────────────────────────────────────────────────
  dependabot-rebase:
    name: Post @dependabot rebase
    runs-on: ubuntu-latest
    if: github.event.action == 'bot-dependabot-rebase'
    steps:
      - name: Post @dependabot rebase
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.BOT_PAT }}
          script: |
            const { pr_number, repo } = context.payload.client_payload;
            const [owner, repoName] = repo.split('/');
            await github.rest.issues.createComment({
              owner,
              repo: repoName,
              issue_number: pr_number,
              body: '@dependabot rebase'
            });

  # ── reminder ───────────────────────────────────────────────────────────────
  reminder:
    name: Post reminder
    runs-on: ubuntu-latest
    if: github.event.action == 'bot-reminder'
    steps:
      - name: Post reminder comment
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.BOT_PAT }}
          script: |
            const { issue_number, repo } = context.payload.client_payload;
            const [owner, repoName] = repo.split('/');
            await github.rest.issues.createComment({
              owner,
              repo: repoName,
              issue_number,
              body: '⏰ Reminder!'
            });
