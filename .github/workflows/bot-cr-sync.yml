name: Bot — CR Sync

# Fires when new commits are pushed to a PR (synchronize event).
#
# Behavior differs by current CR state:
#
#   complete    → reset to "not started". New commits need a fresh review since
#                 the previous one is stale.
#
#   unresolved  → keep "unresolved" (threads are still open). Just add a note to
#                 the HQ showing new commits landed. User can either:
#                   a) reply to each open CR thread and resolve it manually
#                      (bot-cr-gate will flip to complete when all threads close)
#                   b) request an incremental review to re-scan the new diff
#
#   not started / waiting / rate-limited → no action.

on:
  pull_request:
    types: [synchronize]
    branches: [coderabbit]  # TEST GUARD — remove when promoting to main

jobs:
  sync:
    name: Sync CR state on new commits
    runs-on: ubuntu-latest
    if: github.event.pull_request.user.login != 'dependabot[bot]'
    permissions:
      pull-requests: write
      statuses: write
    steps:
      - name: Update CR state
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.BOT_PAT }}
          script: |
            const { owner, repo } = context.repo;
            const pr_number = context.payload.pull_request.number;
            const sha = context.payload.pull_request.head.sha;

            const { data: labelData } = await github.rest.issues.listLabelsOnIssue({
              owner, repo, issue_number: pr_number,
            });
            const labelNames = labelData.map(l => l.name);

            const isUnresolved = labelNames.includes('coderabbit: unresolved');
            const isComplete   = labelNames.includes('coderabbit: complete');

            if (!isUnresolved && !isComplete) {
              core.info(`Labels (${labelNames.join(', ')}) — no action needed.`);
              return;
            }

            // ── find HQ comment ───────────────────────────────────────────────

            const allComments = await github.paginate(github.rest.issues.listComments, {
              owner, repo, issue_number: pr_number, per_page: 100,
            });
            const hqComment = allComments.find(
              c => c.user.login === 'rickcedwhat-ai' && c.body.includes('<!-- bot-hq -->')
            );

            // ── complete → reset to not started ──────────────────────────────
            // Previous review is stale; new commits need a fresh review.

            if (isComplete) {
              for (const l of labelNames.filter(n => n.startsWith('coderabbit:'))) {
                try {
                  await github.rest.issues.removeLabel({
                    owner, repo, issue_number: pr_number, name: l,
                  });
                } catch {}
              }
              await github.rest.issues.addLabels({
                owner, repo, issue_number: pr_number, labels: ['coderabbit: not started'],
              });

              await github.rest.repos.createCommitStatus({
                owner, repo, sha,
                state: 'pending',
                context: 'coderabbit-review',
                description: 'CodeRabbit review not yet requested',
              });

              const newCRSection = [
                '<!-- cr-section-start -->',
                '<!-- cr-trigger-time: -->',
                '',
                '### 🔍 CodeRabbit Review',
                '',
                '> ℹ️ New commits pushed since last review.',
                '',
                '- [ ] Full review &nbsp;&nbsp; - [x] Incremental review _(recommended — reviews new commits only)_',
                '',
                '> _Not yet requested_',
                '<!-- cr-section-end -->',
              ].join('\n');

              if (hqComment) {
                try {
                  await github.rest.issues.updateComment({
                    owner, repo, comment_id: hqComment.id,
                    body: hqComment.body.replace(
                      /<!-- cr-section-start -->[\s\S]*?<!-- cr-section-end -->/,
                      newCRSection
                    ),
                  });
                } catch (err) {
                  core.warning(`Could not update HQ comment: ${err.message}`);
                }
              }

              core.info('complete → not started (new commits pushed)');
              return;
            }

            // ── unresolved → keep label, stamp new SHA status, update HQ note ─
            // Threads are still open. User can reply to threads and resolve them,
            // or request an incremental review. Either path reaches "complete".

            // New commits push a new SHA — stamp it with the current failure status
            // so the merge gate reflects the review state on the latest commit.
            try {
              await github.rest.repos.createCommitStatus({
                owner, repo, sha,
                state: 'failure',
                context: 'coderabbit-review',
                description: 'CodeRabbit review has open comments',
              });
            } catch (err) {
              core.warning(`Could not stamp commit status on new SHA: ${err.message}`);
            }

            const existingSection = hqComment?.body.match(
              /<!-- cr-section-start -->[\s\S]*?<!-- cr-section-end -->/
            )?.[0] ?? '';

            // Preserve trigger_time and checkbox state from the existing section
            const triggerTime = existingSection.match(/<!-- cr-trigger-time: ([^>]*) -->/)?.[1]?.trim() ?? '';
            const checkedLine = /- \[x\] Full review/i.test(existingSection)
              ? '- [x] Full review &nbsp;&nbsp; - [ ] Incremental review'
              : '- [ ] Full review &nbsp;&nbsp; - [x] Incremental review _(recommended — reviews new commits only)_';

            const newCRSection = [
              '<!-- cr-section-start -->',
              `<!-- cr-trigger-time: ${triggerTime} -->`,
              '',
              '### 🔍 CodeRabbit Review',
              checkedLine,
              '',
              '> ❌ Review complete · CHANGES_REQUESTED · resolve comments to unblock merge',
              '',
              '> ℹ️ New commits pushed · reply to open threads to address comments, or request an incremental review to re-scan the new diff',
              '<!-- cr-section-end -->',
            ].join('\n');

            if (hqComment) {
              try {
                await github.rest.issues.updateComment({
                  owner, repo, comment_id: hqComment.id,
                  body: hqComment.body.replace(
                    /<!-- cr-section-start -->[\s\S]*?<!-- cr-section-end -->/,
                    newCRSection
                  ),
                });
              } catch (err) {
                core.warning(`Could not update HQ comment: ${err.message}`);
              }
            }

            core.info('unresolved + new commits — kept label, updated HQ note');
