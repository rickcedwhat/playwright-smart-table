name: Bot — CR Sync

# Fires when new commits are pushed to a PR (synchronize event).
# Resets the CR state when the PR was in a terminal state (unresolved or complete)
# so a fresh review can be requested for the new commits.
#
# Not-started, waiting, and rate-limited states are left unchanged:
#   - not-started: no review was requested, nothing to reset
#   - waiting: CR will review the latest commit when it finishes
#   - rate-limited: retry will pick up the latest commit automatically

on:
  pull_request:
    types: [synchronize]

jobs:
  sync:
    name: Reset CR state on new commits
    runs-on: ubuntu-latest
    if: github.event.pull_request.user.login != 'dependabot[bot]'
    permissions:
      pull-requests: write
      statuses: write
    steps:
      - name: Reset if needed
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.BOT_PAT }}
          script: |
            const { owner, repo } = context.repo;
            const pr_number = context.payload.pull_request.number;
            const sha = context.payload.pull_request.head.sha;

            // Get current labels
            const { data: labelData } = await github.rest.issues.listLabelsOnIssue({
              owner, repo, issue_number: pr_number,
            });
            const labelNames = labelData.map(l => l.name);

            const shouldReset =
              labelNames.includes('coderabbit: unresolved') ||
              labelNames.includes('coderabbit: complete');

            if (!shouldReset) {
              core.info(`Labels (${labelNames.join(', ')}) do not require reset — skipping.`);
              return;
            }

            // Determine what the last review found (for the HQ note)
            const lastReviewOutcome = labelNames.includes('coderabbit: unresolved')
              ? 'CHANGES_REQUESTED'
              : 'APPROVED';

            // ── find HQ comment ───────────────────────────────────────────────

            const allComments = await github.paginate(github.rest.issues.listComments, {
              owner, repo, issue_number: pr_number, per_page: 100,
            });
            const hqComment = allComments.find(
              c => c.user.login === 'rickcedwhat-ai' && c.body.includes('<!-- bot-hq -->')
            );

            // ── swap label to not started ─────────────────────────────────────

            for (const l of labelNames.filter(n => n.startsWith('coderabbit:'))) {
              try {
                await github.rest.issues.removeLabel({
                  owner, repo, issue_number: pr_number, name: l,
                });
              } catch {}
            }
            await github.rest.issues.addLabels({
              owner, repo, issue_number: pr_number, labels: ['coderabbit: not started'],
            });

            // ── set commit status pending ─────────────────────────────────────

            await github.rest.repos.createCommitStatus({
              owner, repo, sha,
              state: 'pending',
              context: 'coderabbit-review',
              description: 'CodeRabbit review not yet requested',
            });

            // ── update HQ CR section ──────────────────────────────────────────
            // Clear trigger_time (no longer valid), show reset notice.
            // Default to incremental checkbox pre-checked (reviews new commits only).

            const newCRSection = [
              '<!-- cr-section-start -->',
              '<!-- cr-trigger-time: -->',
              '',
              '### 🔍 CodeRabbit Review',
              '',
              `> ℹ️ New commits pushed since last review. Last review: **${lastReviewOutcome}**`,
              '',
              '- [ ] Full review &nbsp;&nbsp; - [x] Incremental review _(recommended — reviews new commits only)_',
              '',
              '> _Not yet requested_',
              '<!-- cr-section-end -->',
            ].join('\n');

            if (hqComment) {
              try {
                const updatedBody = hqComment.body.replace(
                  /<!-- cr-section-start -->[\s\S]*?<!-- cr-section-end -->/,
                  newCRSection
                );
                await github.rest.issues.updateComment({
                  owner, repo, comment_id: hqComment.id, body: updatedBody,
                });
              } catch (err) {
                core.warning(`Could not update HQ comment: ${err.message}`);
              }
            }

            core.info(`Reset from "${labelNames.find(n => n.startsWith('coderabbit:'))}" to "coderabbit: not started" (last review: ${lastReviewOutcome})`);
