name: Node.js Package Publish

on:
  push:
    branches:
      - main

jobs:
  publish-gpr:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout Source
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Check if version changed
        id: check_version
        run: |
          PACKAGE_NAME=@rickcedwhat/playwright-smart-table
          LATEST_VERSION=$(npm view $PACKAGE_NAME version 2>/dev/null || echo "0.0.0")
          LOCAL_VERSION=$(node -p "require('./package.json').version")
          
          if [ "$LOCAL_VERSION" != "$LATEST_VERSION" ]; then
            echo "✨ Version change detected!"
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "version=$LOCAL_VERSION" >> $GITHUB_OUTPUT
          else
            echo "💤 Version matches NPM. Skipping release."
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Install Dependencies
        if: steps.check_version.outputs.changed == 'true'
        run: pnpm install --frozen-lockfile

      - name: Build Project
        if: steps.check_version.outputs.changed == 'true'
        run: pnpm run build

      - name: Run Unit Tests
        if: steps.check_version.outputs.changed == 'true'
        run: pnpm run test:unit -- --reporter=json --outputFile.json=test-results.json

      - name: Test Packaging
        if: steps.check_version.outputs.changed == 'true'
        run: |
          chmod +x scripts/test-packaging.sh
          ./scripts/test-packaging.sh

      - name: Publish to NPM
        if: steps.check_version.outputs.changed == 'true'
        run: npm publish --provenance --access public
      
      - name: Prepare changelog for GitHub Release
        if: steps.check_version.outputs.changed == 'true'
        id: get_changelog
        run: |
          version=${{ steps.check_version.outputs.version }}
          # Try robust Node-based extraction first
          body=$(node ./scripts/extract-changelog.mjs "$version" 2>/dev/null || echo "")
          # Fallback: default release body if extraction failed or returned empty
          if [ -z "$body" ]; then
            body="Release $version"
          fi
          echo "body<<EOF" >> $GITHUB_OUTPUT
          echo "$body" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        if: steps.check_version.outputs.changed == 'true'
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag_name: v${{ steps.check_version.outputs.version }}
          name: v${{ steps.check_version.outputs.version }}
          body: ${{ steps.get_changelog.outputs.body }}
          draft: false
          prerelease: false

      - name: Collect Library Metrics
        if: steps.check_version.outputs.changed == 'true' && success()
        run: node scripts/collect-metrics.mjs

      - name: Commit Metrics
        if: steps.check_version.outputs.changed == 'true' && success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add metrics/history.json
          git diff --cached --quiet || git commit -m "chore: record metrics for v${{ steps.check_version.outputs.version }} [skip ci]"
          git push