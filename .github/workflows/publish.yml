name: Node.js Package Publish

on:
  push:
    branches:
      - main

jobs:
  publish-gpr:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout Source
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Update npm
        run: npm install -g npm@latest

      - name: Check if version changed
        id: check_version
        run: |
          PACKAGE_NAME=@rickcedwhat/playwright-smart-table
          LATEST_VERSION=$(npm view $PACKAGE_NAME version 2>/dev/null || echo "0.0.0")
          LOCAL_VERSION=$(node -p "require('./package.json').version")
          
          if [ "$LOCAL_VERSION" != "$LATEST_VERSION" ]; then
            echo "✨ Version change detected!"
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "version=$LOCAL_VERSION" >> $GITHUB_OUTPUT
          else
            echo "💤 Version matches NPM. Skipping release."
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Cache Playwright
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Dependencies
        run: npm ci

      - name: Install Playwright Browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps

      - name: Install Playground Dependencies
        run: cd playground && npm ci

      - name: Run Tests
        run: npm test

      - name: Test Packaging
        run: |
          chmod +x scripts/test-packaging.sh
          ./scripts/test-packaging.sh

      - name: Publish to NPM
        if: steps.check_version.outputs.changed == 'true'
        run: npm publish --provenance --access public
      
      - name: Prepare changelog for GitHub Release
        if: steps.check_version.outputs.changed == 'true'
        id: get_changelog
        run: |
          version=${{ steps.check_version.outputs.version }}
          # Try robust Node-based extraction first
          body=$(node ./scripts/extract-changelog.mjs "$version" 2>/dev/null || echo "")
          # Fallback: default release body if extraction failed or returned empty
          if [ -z "$body" ]; then
            body="Release $version"
          fi
          echo "body<<EOF" >> $GITHUB_OUTPUT
          echo "$body" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release (from changelog)
        if: steps.check_version.outputs.changed == 'true'
        uses: actions/create-release@v1
        with:
          tag_name: v${{ steps.check_version.outputs.version }}
          release_name: v${{ steps.check_version.outputs.version }}
          body: ${{ steps.get_changelog.outputs.body }}
          draft: false
          prerelease: false