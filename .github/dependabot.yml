# CODEOWNERS + Dependabot: see .github/DEPENDABOT.md (ruleset Dependabot bypass).
version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 1
    labels:
      - "dependencies"
      - "auto-approve"
    rebase-strategy: "auto"
    groups:
      weekly-npm-dependencies:
        applies-to: "version-updates"
        patterns:
          - "*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 1
    labels:
      - "dependencies"
      - "auto-approve"
    rebase-strategy: "auto"
    groups:
      weekly-github-actions:
        applies-to: "version-updates"
        patterns:
          - "*"

