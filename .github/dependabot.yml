# CODEOWNERS + Dependabot: see .github/DEPENDABOT.md (ruleset Dependabot bypass).
version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
    open-pull-requests-limit: 1
    draft: true
    labels:
      - "dependencies"
      - "auto-approve"
    rebase-strategy: "auto"
    # vitest 4.x requires vite >=6, but vitepress 1.x bundles vite 5 — incompatible under pnpm.
    # Remove these ignores once vitepress 2.0 stable ships and is upgraded.
    # Tracked in: https://github.com/rickcedwhat/playwright-smart-table/issues/118
    ignore:
      - dependency-name: "vitest"
        versions: [">=4"]
      - dependency-name: "@vitest/ui"
        versions: [">=4"]
      - dependency-name: "@vitest/coverage-v8"
        versions: [">=4"]
    groups:
      weekly-npm-dependencies:
        applies-to: "version-updates"
        patterns:
          - "*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "thursday"
      time: "08:00"
    open-pull-requests-limit: 1
    draft: true
    labels:
      - "dependencies"
      - "auto-approve"
    rebase-strategy: "auto"
    groups:
      weekly-github-actions:
        applies-to: "version-updates"
        patterns:
          - "*"

