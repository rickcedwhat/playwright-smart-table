<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1280px; height: 640px; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    background:
      radial-gradient(circle at 1px 1px, rgba(148,163,184,0.10) 1px, transparent 0) 0 0 / 26px 26px,
      #080b12;
    color: #e8edf8;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 64px 80px;
  }
  .title {
    font-size: 78px;
    font-weight: 800;
    letter-spacing: -0.035em;
    line-height: 1.02;
    color: #49de80;
  }
  .pkg {
    font-family: 'SF Mono', 'JetBrains Mono', Menlo, Consolas, monospace;
    font-size: 24px;
    color: #64748b;
    margin-top: 16px;
  }
  .tagline {
    font-size: 34px;
    font-weight: 600;
    color: #cbd5e1;
    margin-top: 18px;
  }
  .card {
    margin-top: 40px;
    border-radius: 18px;
    padding: 36px 44px;
    border: 1px solid rgba(73, 222, 128, 0.4);
    background: linear-gradient(180deg, rgba(73,222,128,0.10), rgba(73,222,128,0.02)), #020617;
    box-shadow: 0 20px 60px rgba(73, 222, 128, 0.14);
  }
  pre {
    font-family: 'SF Mono', 'JetBrains Mono', Menlo, Consolas, monospace;
    font-size: 27px;
    line-height: 1.65;
    color: #cdd6f4;
    white-space: pre;
  }
  .kw { color: #f38ba8; }
  .fn { color: #89b4fa; }
  .str { color: #a6e3a1; }
</style>
</head>
<body>
  <div class="title">Playwright Smart Table</div>
  <div class="pkg">@rickcedwhat/playwright-smart-table</div>
  <div class="tagline">You describe your table. It does the rest.</div>
  <div class="card">
<pre><span class="kw">const</span> row = table.<span class="fn">getRow</span>({ firstName: <span class="str">'John'</span>, lastName: <span class="str">'Doe'</span> })
<span class="kw">const</span> email = <span class="kw">await</span> row.<span class="fn">getCell</span>(<span class="str">'Email'</span>).<span class="fn">innerText</span>()</pre>
  </div>
</body>
</html>
