"+"T = any> {\n    private resolve: (item: Selector, parent: Locator | Page) => Locator;\n\n    constructor(\n        private rootLocator: Locator,\n        private config: FinalTableConfig,\n        resolve: (item: Selector, parent: Locator | Page) => Locator,\n        private filterEngine: FilterEngine,\n        private tableMapper: TableMapper,\n        private makeSmartRow: (loc: Locator, map: Map<"+"string, number>, index: number, tablePageIndex?: number) => SmartRow<"+"T>,\n        private tableState: { currentPageIndex: number } = { currentPageIndex: 0 }\n    ) {\n        this.resolve = resolve;\n    }\n\n    private log(msg: string) {\n        logDebug(this.config, 'verbose', msg);\n    }\n\n    public async findRow(\n        filters: Record<"+"string, FilterValue>,\n        options: { exact?: boolean, maxPages?: number } = {}\n    ): Promise<"+"SmartRow<"+"T>> {\n        logDebug(this.config, 'info', 'Searching for row', filters);\n\n        await this.tableMapper.getMap();\n\n        const rowLocator = await this.findRowLocator(filters, options);\n\n        if (rowLocator) {\n            logDebug(this.config, 'info', 'Row found');\n            await debugDelay(this.config, 'findRow');\n            return this.makeSmartRow(rowLocator, await this.tableMapper.getMap(), 0);\n        }\n\n        logDebug(this.config, 'error', 'Row not found', filters);\n        await debugDelay(this.config, 'findRow');\n\n        const sentinel = this.resolve(this.config.rowSelector, this.rootLocator)\n            .filter({ hasText: \"___SENTINEL_ROW_NOT_FOUND___\" + Date.now() });\n        const smartRow = this.makeSmartRow(sentinel, await this.tableMapper.getMap(), 0);\n        (smartRow as any)[SENTINEL_ROW] = true;\n        return smartRow;\n    }\n\n    public async findRows(\n        filters: Record<"+"string, FilterValue> = {},\n        options?: { exact?: boolean, maxPages?: number }\n    ): Promise<"+"SmartRowArray<"+"T>> {\n        const filtersRecord = filters;\n        const map = await this.tableMapper.getMap();\n        const allRows: SmartRow<"+"T>[] = [];\n        const effectiveMaxPages = options?.maxPages ?? this.config.maxPages ?? Infinity;\n        let pagesScanned = 1;\n\n        this.log(`findRows: starting (maxPages=${effectiveMaxPages}, filters=${JSON.stringify(filtersRecord)})`);\n\n        const tracker = new ElementTracker('findRows');\n\n        try {\n            const collectMatches = async () => {\n                let rowLocators = this.resolve(this.config.rowSelector, this.rootLocator);\n                // Only apply filters if we have them\n                if (Object.keys(filtersRecord).length > 0) {\n                    rowLocators = this.filterEngine.applyFilters(\n                        rowLocators,\n                        filtersRecord,\n                        map,\n                        options?.exact ?? false,\n                        this.rootLocator.page(),\n                        this.rootLocator\n                    );\n                }\n\n                // Get only newly seen matched rows\n                const newIndices = await tracker.getUnseenIndices(rowLocators);\n                const currentRows = await rowLocators.all();\n                const isRowLoading = this.config.strategies.loading?.isRowLoading;\n                let added = 0;\n\n                for (const idx of newIndices) {\n                    const smartRow = this.makeSmartRow(currentRows[idx], map, allRows.length, this.tableState.currentPageIndex);\n                    if (isRowLoading && await isRowLoading(smartRow)) {\n                        this.log(`findRows: page ${this.tableState.currentPageIndex} — row skipped (isRowLoading=true)`);\n                        continue;\n                    }\n                    allRows.push(smartRow);\n                    added++;\n                }\n                this.log(`findRows: page ${this.tableState.currentPageIndex} — ${added} new match(es) (total: ${allRows.length .currentPageIndex).toJSON();\n                        sampleData.push(JSON.stringify(rowData));\n                    }\n                } catch (e) { }\n                const sampleMsg = sampleData.length > 0 ? `\\nSample matching rows:\\n${sampleData.map((d, i) => `  ${i + 1}. ${d}`).join('\\n')}` : '';\n\n                throw new Error(\n                    `Ambiguous Row: Found ${count} rows matching ${JSON.stringify(filters)} on page ${this.tableState.currentPageIndex}. ` +\n                    `Expected exactly one match. Try adding more filters to make your query unique.${sampleMsg}`\n                );\n            }\n\n            if (count === 1) return matchedRows.first();\n\n            if (pagesScanned <"+" effectiveMaxPages) {\n                this.log(`Page ${this.tableState.currentPageIndex}: Not found. Attempting pagination...`);\n                const context: TableContext = {\n                    root: this.rootLocator,\n                    config: this.config,\n                    resolve: this.resolve,\n                    page: this.rootLocator.page()\n                };\n\n                let paginationResult: boolean | number | PaginationPrimitives | undefined;\n                if (this.config.strategies.pagination?.goNextBulk) {\n                    paginationResult = await this.config.strategies.pagination.goNextBulk(context);\n                } else if (this.config.strategies.pagination?.goNext) {\n                    paginationResult = await this.config.strategies.pagination.goNext(context);\n                } else {\n                    this.log(`Page ${this.tableState.currentPageIndex}: Pagination failed (no goNext or goNextBulk primitive).`);\n                    return null;\n                }\n\n                const didLoadMore = validatePaginationResult(paginationResult, 'Pagination Strategy');\n\n                if (didLoadMore) {\n                    const pagesJumped = typeof paginationResult === 'number' ? paginationResult : 1; onOptions } from '../types';\nimport type { FinalTableConfig } from '../types';\nimport type { SmartRowArray } from '../utils/smartRowArray';\nimport { ElementTracker } from '../utils/elementTracker';\nimport { logDebug } from '../utils/debugUtils';\n\nexport interface TableIterationEnv<"+"T = any> {\n  getRowLocators: () => Locator;\n  getMap: () => Map<"+"string, number>;\n  advancePage: (useBulk: boolean) => Promise<"+"boolean>;\n  makeSmartRow: (rowLocator: Locator, map: Map<"+"string, number>, rowIndex: number, tablePageIndex?: number) => SmartRow<"+"T>;\n  createSmartRowArray: (rows: SmartRow<"+"T>[]) => SmartRowArray<"+"T>;\n  config: FinalTableConfig<"+"T>;\n  getPage: () => Page;\n}\n\nfunction log(config: FinalTableConfig, msg: string) {\n  logDebug(config, 'verbose', msg);\n}\n\n/**\n * Shared row-iteration loop used by forEach, map, and filter.\n */\nexport async function runForEach<"+"T>(\n  env: TableIterationEnv<"+"T>,\n  callback: (ctx: RowIterationContext<"+"T>) => void | Promise<"+"void>,\n  options: RowIterationOptions = {}\n): Promise<"+"void> {\n  const map = env.getMap();\n  const effectiveMaxPages = options.maxPages ?? env.config.maxPages;\n  const dedupeStrategy = options.dedupe ?? env.config.strategies.dedupe;\n  const dedupeKeys = dedupeStrategy ? new Set<"+"string | number>() : null;\n  const parallel = options.parallel ?? false;\n  const useBulk = options.useBulkPagination ?? false;\n  const tracker = new ElementTracker('forEach');\n\n  log(env.config, `forEach: starting (maxPages=${effectiveMaxPages}, parallel=${parallel}, dedupe=${!!dedupeStrategy})`);\n\n  try {\n    let rowIndex = 0;\n    let stopped = false;\n    let pagesScanned = 1;\n    let totalProcessed = 0;\n    const stop = () => {\n      log(env.config, `forEach: stop() called — halting after current page`);\n      stopped = true;\n    };\n\n    while (!stopped) {\n      const rowLocators = env.getRowLocators();\n      const newIndices = await tracker.getUnseenIndices(rowLoca ve: this.resolve\n        };\n\n        let lastError: Error | null = null;\n\n        while (Date.now() - startTime <"+" headerTimeout) {\n            // 1. Wait for visibility\n            try {\n                await headerLoc.first().waitFor({ state: 'visible', timeout: 200 });\n            } catch (e) {\n                // Continue to check existing/loading state even if not strictly \"visible\" yet\n            }\n\n            // 2. Check Smart Loading State\n            if (this.config.strategies.loading?.isHeaderLoading) {\n                const isStable = !(await this.config.strategies.loading.isHeaderLoading(context));\n                if (!isStable) {\n                    this.log('Headers are loading/unstable... waiting');\n                    await new Promise(r => setTimeout(r, 100));\n                    continue;\n                }\n            }\n\n            // 3. Attempt Scan\n            try {\n                const rawHeaders = await strategy(context);\n                const entries = await this.processHeaders(rawHeaders);\n\n                // Success\n                this._headerMap = new Map(entries);\n                this.log(`Mapped ${entries.length} columns: ${JSON.stringify(entries.map(e => e[0]))}`);\n                return this._headerMap;\n\n            } catch (e) {\n                lastError = e as Error;\n                this.log(`Header mapping failed (retrying): ${(e as Error).message}`);\n                await new Promise(r => setTimeout(r, 100));\n            }\n        }\n\n        throw lastError || new Error(`Timed out waiting for headers after ${headerTimeout}ms`);\n    }\n\n    public async remapHeaders(): Promise<"+"void> {\n        this._headerMap = null;\n        await this.getMap();\n    }\n\n    public getMapSync(): Map<"+"string, number> | null {\n        return this._headerMap;\n    }\n\n    public isInitialized(): boolean {\n        return this._headerMap !== null;\n    }\n\n    public clear(): void {\n        this._headerMap = null;\n    }\n\n    private async processHeaders(rawHeaders: string[]): Promise<"+"[string, number][]> {\n        const seenHeaders = new Set<"+"string>();\n        const entries: [string, number][] = [];\n\n        for (let i = 0; i <"+" rawHeaders.length; i++) {\n            let text = rawHeaders[i].trim() || `__col_${i}`;\n            if (this.config.headerTransformer) {\n                text = await this.config.headerTransformer({\n                    text,\n                    index: i,\n                    locator: this.resolve(this.config.headerSelector, this.rootLocator).nth(i),\n                    seenHeaders\n                });\n            }\n            entries.push([text, i]);\n            seenHeaders.add(text);\n        }\n\n        // Validation: Check for empty table\n        if (entries.length === 0) {\n            throw new Error(`Initialization Error: No columns found using selector \"${this.config.headerSelector}\". Check your selector or ensure the table is visible.`);\n        }\n\n        // Validation: Check for duplicates\n        const seen = new Set<"+"string>();\n        const duplicates = new Set<"+"string>();\n        for (const [name] of entries) {\n            if (seen.has(name)) {\n                duplicates.add(name);\n            }\n            seen.add(name);\n        }\n\n        if (duplicates.size > 0) {\n            const dupList = Array.from(duplicates).map(d => `\"${d}\"`).join(', ');\n            throw new Error(`Initialization Error: Duplicate column names found: ${dupList}. Use 'headerTransformer' to rename duplicate columns.`);\n        }\n\n        return entries;\n    }\n}\n"},"src/plugins/glide/columns.ts":{"language":"typescript","mutants":[{"id":"490","mutatorName":"BlockStatement","replacement":"{}","status":"NoCoverage","static":false,"coveredBy":[],"location":{"end":{"column":2,"line":11},"start":{"column":62,"line":9}}},{"id":"491","mutatorName":"StringLiteral","replacement":"\"\"","status":"NoC  '@playwright/test';\nimport { SmartRow as SmartRowType, FillOptions, FinalTableConfig, TableResult } from './types';\nimport { FillStrategies } from './strategies/fill';\nimport { buildColumnNotFoundError } from './utils/stringUtils';\nimport { debugDelay, logDebug } from './utils/debugUtils';\nimport { planNavigationPath, executeNavigationPath, executeNavigationWithGoToPageRetry } from './utils/paginationPath';\nimport { SENTINEL_ROW } from './utils/sentinel';\n\ntype StrategyContext = {\n    config: FinalTableConfig<"+"any>;\n    root: Locator;\n    page: Page;\n    resolve: (item: any, parent: Locator | Page) => Locator;\n};\n\n/**\n * Internal helper to navigate to a cell with active cell optimization.\n * Uses navigation primitives (goUp, goDown, goLeft, goRight, goHome) for orchestration.\n * Returns the target cell locator after navigation.\n */\nconst _navigateToCell = async (params: {\n    config: FinalTableConfig<"+"any>;\n    rootLocator: Locator;\n    page: Page;\n    resolve: (item: any, parent: Locator | Page) => Locator;\n    column: string;\n    index: number;\n    rowLocator: Locator;\n    rowIndex?: number;\n}): Promise<"+"Locator | null> => {\n    const { config, rootLocator, page, resolve, column, index, rowLocator, rowIndex } = params;\n\n    // Get active cell if strategy is available\n    let activeCell = null;\n    if (config.strategies.getActiveCell) {\n        activeCell = await config.strategies.getActiveCell({\n            config,\n            root: rootLocator,\n            page,\n            resolve\n        });\n\n        // Optimization: Check if we are ALREADY at the target cell\n        if (activeCell && activeCell.rowIndex === rowIndex && activeCell.columnIndex === index) {\n            // Skip navigation - we're already there!\n            return activeCell.locator;\n        }\n    }\n\n    const context: StrategyContext = { config, root: rootLocator, page, resolve };\n\n    // Use navigation primitives if available\n    if (config.strategies.navigation) {\n        const nav = config.strategies.navigation;\n\n        if (typeof rowIndex !== 'number') {\n            throw new Error('Row index is required for navigation');\n        }\n\n        // Determine starting position\n        let startRow = 0;\n        let startCol = 0;\n\n        if (activeCell && activeCell.rowIndex >= 0 && activeCell.columnIndex >= 0) {\n            // Use current position\n            startRow = activeCell.rowIndex;\n            startCol = activeCell.columnIndex;\n        } else if (nav.goHome) {\n            // Reset to top-left\n            await nav.goHome(context);\n        }\n\n        // Calculate movement needed\n        const rowDiff = rowIndex - startRow;\n        const colDiff = index - startCol;\n\n        // Navigate vertically\n        for (let i = 0; i <"+" Math.abs(rowDiff); i++) {\n            if (rowDiff > 0 && nav.goDown) {\n                await nav.goDown(context);\n            } else if (rowDiff <"+" 0 && nav.goUp) {\n                await nav.goUp(context);\n            }\n        }\n\n        // Navigate horizontally\n        for (let i = 0; i <"+" Math.abs(colDiff); i++) {\n            if (colDiff > 0 && nav.goRight) {\n                await nav.goRight(context);\n            } else if (colDiff <"+" 0 && nav.goLeft) {\n                await nav.goLeft(context);\n            }\n        }\n\n        // Wait for active cell to match target: poll getActiveCell or fallback to fixed delay\n        if (config.strategies.getActiveCell) {\n            const pollIntervalMs = 10;\n            const maxWaitMs = 50;\n            const start = Date.now();\n            while (Date.now() - start <"+" maxWaitMs) {\n                const updatedActiveCell = await config.strategies.getActiveCell({\n                    config,\n                    root: rootLocator,\n                    page,\n                    resolve\n                });\n                if (updatedActiveCell && updatedActiveCell.rowIndex === rowIndex && updatedActiveCell.columnIndex === index) {\n                    return updatedActiveCell.locator;\n                }\n                await page.waitForTimeout(pollIntervalMs);\n            }\n            const final = await config.strategies.getActiveCell({\n                config,\n                root: rootLocator,\n                page,\n                resolve\n            });\n            if (final) return final.locator;\n            return null;\n        }\n\n        return null;\n    }\n    return null;\n};\n\n/**\n * Factory to create a SmartRow by extending a Playwright Locator.\n * We avoid Class/Proxy to ensure full compatibility with Playwright's expect(locator) matchers.\n */\n/**\n * @internal Internal factory for creating SmartRow objects.\n * Not part of the public package surface; tests and consumers should use public APIs.\n */\nconst createSmartRow = <"+"T = any>(\n    rowLocator: Locator,\n    map: Map<"+"string, number>,\n    rowIndex: number | undefined,\n    config: FinalTableConfig<"+"T>,\n    rootLocator: Locator,\n    resolve: (item: any, parent: Locator | Page) => Locator,\n    table: TableResult<"+"T> | null,\n    tablePageIndex?: number\n): SmartRowType<"+"T> => {\n    const smart = rowLocator as unknown as SmartRowType<"+"T>;\n\n    // Attach State\n    smart.rowIndex = rowIndex;\n    smart.tablePageIndex = tablePageIndex;\n    smart.table = table as any;\n\n    // Attach Methods\n    smart.getCell = (colName: string): Locator => {\n        const idx = map.get(colName);\n        if (idx === undefined) {\n            throw new Error(buildColumnNotFoundError(colName, Array.from(map.keys())));\n        }\n\n        if (config.strategies.getCellLocator) {\n            return config.strategies.getCellLocator({\n                row: rowLocator,\n                columnName: colName,\n                columnIndex: idx,\n                rowIndex: rowIndex,\n                page: rootLocator.page()\n            });\n        }\n\n        return resolve(config.cellSelector, rowLocator).nth(idx);\n    };\n\n    smart.wasFound = (): boolean => {\n        return !(smart as any)[SENTINEL_ROW];\n    };\n\n    smart.toJSON = async (options?: { columns?: string[] }): Promise<"+"T> => {\n        const result: Record<"+"string, any> = {};\n        const page = rootLocator.page();\n\n        // Build a getHeaderCell helper for the beforeCellRead context.\n        // Uses the table reference if available, otherwise falls back to index-based lookup.\n        const getHeaderCell = table?.getHeaderCell\n            ? table.getHeaderCell.bind(table)\n            : async (colName: string) => {\n                const idx = map.get(colName);\n                if (idx === undefined) throw new Error(`Column \"${colName}\" not found`);\n                return resolve(config.headerSelector as any, rootLocator).nth(idx);\n            };\n\n        for (const [col, idx] of map.entries()) {\n            if (options?.columns && !options.columns.includes(col)) {\n                continue;\n            }\n\n            // Check if we have a column override for this column\n            const columnOverride = config.columnOverrides?.[col as keyof T];\n            const mapper = columnOverride?.read;\n\n            // --- Navigation Logic Start ---\n            const cell = config.strategies.getCellLocator\n                ? config.strategies.getCellLocator({\n                    row: rowLocator,\n                    columnName: col,\n                    columnIndex: idx,\n                    rowIndex: rowIndex,\n                    page: page\n                })\n                : resolve(config.cellSelector, rowLocator).nth(idx);\n\n            let targetCell = cell;\n            const count = await cell.count();\n\n            if (count === 0) {\n                // Cell not in DOM (virtualized) - navigate to it\n                const navigatedCell = await _navigateToCell({\n                    config,\n         resolve,\n                column: colName,\n                index: colIdx,\n                rowLocator,\n                rowIndex\n            });\n\n            const columnOverride = config.columnOverrides?.[colName as keyof T];\n            if (columnOverride?.write) {\n                const cellLocator = smart.getCell(colName);\n\n                let currentValue;\n                if (columnOverride.read) {\n                    currentValue = await columnOverride.read(cellLocator);\n                }\n\n                await columnOverride.write({\n                    cell: cellLocator,\n                    targetValue: value,\n                    currentValue,\n                    row: smart\n                });\n            } else {\n                const strategy = config.strategies.fill || FillStrategies.default;\n\n                logDebug(config, 'verbose', `Filling cell \"${colName}\" with value`, value);\n\n                await strategy({\n                    row: smart,\n                    columnName: colName,\n                    value,\n                    index: rowIndex ?? -1,\n                    page: rowLocator.page(),\n                    rootLocator,\n                    config,\n                    table: table as TableResult<"+"T>,\n                    fillOptions\n                });\n            }\n\n            // Delay after filling\n            await debugDelay(config, 'getCell');\n        }\n\n        logDebug(config, 'info', 'Row fill complete');\n    };\n\n    smart.bringIntoView = async (): Promise<"+"void> => {\n        if (rowIndex === undefined) {\n            throw new Error('Cannot bring row into view - row index is unknown. Use getRowByIndex() instead of getRow().');\n        }\n\n        const parentTable = smart.table as TableResult<"+"T>;\n\n        // Cross-page Navigation: when goToPage exists use retry loop (supports windowed UIs); otherwise use path planner or goToFirst+goNext\n        if (tablePageIndex !== un acement":"() => undefined","status":"NoCoverage","static":false,"coveredBy":[],"location":{"end":{"column":50,"line":390},"start":{"column":19,"line":390}}},{"id":"1492","mutatorName":"ArrowFunction","replacement":"() => undefined","status":"NoCoverage","static":false,"coveredBy":[],"location":{"end":{"column":87,"line":392},"start":{"column":25,"line":392}}},{"id":"1493","mutatorName":"ArrowFunction","replacement":"() => undefined","status":"NoCoverage","static":false,"coveredBy":[],"location":{"end":{"column":44,"line":395},"start":{"column":20,"line":395}}},{"id":"1494","mutatorName":"BlockStatement","replacement":"{}","status":"NoCoverage","static":false,"coveredBy":[],"location":{"end":{"column":6,"line":409},"start":{"column":33,"line":404}}},{"id":"1495","mutatorName":"StringLiteral","replacement":"\"\"","status":"NoCoverage","static":false,"coveredBy":[],"location":{"end":{"column":28,"line":406},"start":{"column":25,"line":406}}},{"id":"1496","mutatorName":"StringLiteral","replacement":"``","status":"NoCoverage","static":false,"coveredBy":[],"location":{"end":{"column":269,"line":407},"start":{"column":23,"line":407}}},{"id":"1497","mutatorName":"MethodExpression","replacement":"html","status":"NoCoverage","static":false,"coveredBy":[],"location":{"end":{"column":239,"line":407},"start":{"column":215,"line":407}}},{"id":"1498","mutatorName":"StringLiteral","replacement":"\"\"","status":"NoCoverage","static":false,"coveredBy":[],"location":{"end":{"column":47,"line":408},"start":{"column":27,"line":408}}},{"id":"1499","mutatorName":"BlockStatement","replacement":"{}","status":"NoCoverage","static":false,"coveredBy":[],"location":{"end":{"column":6,"line":414},"start":{"column":39,"line":411}}},{"id":"1500","mutatorName":"StringLiteral","replacement":"\"\"","status":"NoCoverage","static":false,"coveredBy":[],"location":{"end":{"column":154,"line":412},"start":{"column":20,"line":412}}},{"id":"1501","mutatorName":"ArrowFunction","replacement":"() => undefined","status":"NoCoverage","static":false,"coveredBy":[],"location":{"end":{"column":5,"line":425},"start":{"column":27,"line":417}}},{"id":"1502","mutatorName":"ObjectLiteral","replacement":"{}","status":"NoCoverage","static":false,"coveredBy":[],"location":{"end":{"column":4,"line":425},"start":{"column":34,"line":417}}}],"source":"import type { Locator, Page } from '@playwright/test';\nimport { TableConfig, TableContext, Selector, TableResult, SmartRow as SmartRowType, FinalTableConfig, DedupeStrategy, PaginationStrategy, StrategyContext, TableStrategies as ITableStrategies, FilterValue } from './types';\nimport { TYPE_CONTEXT } from './typeContext';\nimport { MINIMAL_CONFIG_CONTEXT } from './minimalConfigContext';\nimport { SortingStrategies as ImportedSortingStrategies } from './strategies/sorting';\nimport { PaginationStrategies as ImportedPaginationStrategies } from './strategies/pagination';\nimport { validatePaginationResult } from './strategies/validation';\n\nimport { DedupeStrategies as ImportedDedupeStrategies } from './strategies/dedupe';\nimport { LoadingStrategies as ImportedLoadingStrategies } from './strategies/loading';\nimport { FillStrategies } from './strategies/fill';\nimport { HeaderStrategies } from './strategies/headers';\n\nimport createSmartRow from './smartRow';\nimport { FilterEngine } from './filterEngine';\nimport { TableMapper } from './engine/tableMapper';\nimport { RowFinder } from './engine/rowFinder';\nimport { runForEach, runMap, runFilter } from './engine/tableIteration';\nimport { ResolutionStrategies } from './strategies/resolution';\nimport { debugDelay, logDebug, warnIfDebugInCI } from './utils/debugUtils';\nimport { createSmartRowArray, SmartRowArray } from './utils/smartRowArray';\nimport { ElementTracker } from './utils/elementTracker';\n\n/**\n * Main hook to interact with a table.\n */\nexport const useTable = <"+"T = any>(rootLocator: Locator, configOptions: TableConfig<"+"T> = {}): TableResult<"+"T> => {\n  // Store whether pagination was explicitly provided in config\n  const hasPaginationInConfig = configOptions.strategies?.pagination !== undefined;\n\n  // Default strategies\n  const defaultStrategies: ITableStrategies = {\n    fill: FillStrategies.default,\n    header: HeaderStrategies.visible,\n\n    pagination: {},\n    loading: {\n      isHeaderLoading: ImportedLoadingStrategies.Headers.stable(200)\n    }\n  };\n\n  const config: FinalTableConfig<"+"T> = {\n    rowSelector: \"tbody tr\",\n    headerSelector: \"thead th\",\n    cellSelector: \"td\",\n    maxPages: 1,\n    headerTransformer: ({ text }) => text,\n    autoScroll: true,\n    onReset: async () => { /* no-op default */ },\n    ...configOptions,\n    strategies: {\n      ...defaultStrategies,\n      ...configOptions.strategies,\n    }\n  };\n\n  const resolve = (item: Selector, parent: Locator | Page): Locator => {\n    if (typeof item === 'string') return parent.locator(item);\n    if (typeof item === 'function') return (item as any)(parent);\n    return item;\n  };\n\n  // Internal State\n  let _hasPaginated = false;\n\n  // Helpers\n  const log = (msg: string) => {\n    logDebug(config, 'verbose', msg);\n  };\n\n  const _createColumnError = (colName: string, map: Map<"+"string, number>, context?: string): Error => {\n    const availableColumns = Array.from(map.keys());\n    const lowerCol = colName.toLowerCase();\n    const suggestions = availableColumns.filter(col =>\n      col.toLowerCase().includes(lowerCol) ||\n      lowerCol.includes(col.toLowerCase()) ||\n      col.toLowerCase().replace(/\\s+/g, '') === lowerCol.replace(/\\s+/g, '')\n    );\n    let suggestion = '.';\n    if (suggestions.length > 0 && suggestions[0] !== colName) {\n      suggestion = `. Did you mean \"${suggestions[0]}\"?`;\n    } else if (availableColumns.length > 0 && availableColumns.length <"+"= 10) {\n      suggestion = `. Available columns: ${availableColumns.map(c => `\"${c}\"`).join(', ')}`;\n    } else if (availableColumns.length > 0) {\n      suggestion = `. Available columns (first 10 of ${availableColumns.length}): ${availableColumns.slice(0, 10).map(c => `\"${c}\"`).join(', ')}, ...`;\n    }\n\n    const contextMsg = context ? ` (${context})` : '';\n    return new Error(`Column \"${colName}\" not found${contextMsg}${suggestion}`);\n  };\n\n  // Engines\n  const filterEngine = new FilterEngine(config, resolve);\n  const tableMapper = new TableMapper(rootLocator, config, resolve);\n\n  // Placeholder for the final table object\n  let finalTable: TableResult<"+"T> = null as unknown as TableResult<"+"T>;\n\n  // Helper factory\n  const _makeSmart = (rowLocator: Locator, map: Map<"+"string, number>, rowIndex?: number, tablePageIndex?: number): SmartRowType => {\n    return createSmartRow<"+"T>(rowLocator, map, rowIndex, config, rootLocator, resolve, finalTable, tablePageIndex);\n  };\n\n  const tableState = { currentPageIndex: 0 };\n  const rowFinder = new RowFinder<"+"T>(rootLocator, config, resolve, filterEngine, tableMapper, _makeSmart, tableState);\n\n  /** Builds a full TableContext/StrategyContext with getHeaderCell, getHeaders, scrollToColumn. Set after result is created. */\n  let createStrategyContext: () => TableContext = () => ({ root: rootLocator, config, page: rootLocator.page(), resolve });\n\n  const _getCleanHtml = async (loc: Locator): Promise<"+"string> => {\n    return loc.evaluate((el) => {\n      const clone = el.cloneNode(true) as Element;\n      const removeSelectors = 'script, style, svg, path, circle, rect, noscript, [hidden]';\n      clone.querySelectorAll(removeSelectors).forEach(n => n.remove());\n      const walker = document.createTreeWalker(clone, NodeFilter.SHOW_ELEMENT);\n      let currentNode = walker.currentNode as Element;\n      while (currentNode) {\n        currentNode.removeAttribute('style');\n        currentNode.removeAttribute('data-reactid');\n        const cls = currentNode.getAttribute('class');\n        if (cls && cls.length > 80) {\n          const tokens = cls.split(' ');\n          if (tokens.length > 5) {\n            currentNode.setAttribute('class', tokens.slice(0, 4).join(' ') + ' ...');\n          }\n        }\n        currentNode = walker.nextNode() as Element;\n      }\n      return clone.outerHTML;\n    });\n  };\n\n  const _handlePrompt = async (promptName: string, content: string) => {\n    let finalPrompt = content;\n    finalPrompt += `\\n\\n👇 Useful TypeScript Definitions 👇\\n\\`\\`\\`typescript\\n${MINIMAL_CONFIG_CONTEXT}\\n\\`\\`\\`\\n`;\n\n    console.log(`⚠️ Throwing error to display [${promptName}] cleanly...`);\n    throw new Error(finalPrompt);\n  };\n\n  const _autoInit = async () => {\n    await tableMapper.getMap();\n  };\n\n  // Default: goNext (one page). Pass useBulk true to prefer goNextBulk. \"How far\" uses numeric return when strategy provides it.\n  const _advancePage = async (useBulk: boolean = false): Promise<"+"boolean> => {\n    const context = createStrategyContext();\n    const pagination = config.strategies.pagination;\n    let rawResult: boolean | number | undefined;\n    let primitive: string;\n    if (useBulk && pagination?.goNextBulk) {\n      primitive = 'goNextBulk';\n      rawResult = await pagination.goNextBulk(context);\n    } else if (pagination?.goNext) {\n      primitive = 'goNext';\n      rawResult = await pagination.goNext(context);\n    } else if (pagination?.goNextBulk) {\n      primitive = 'goNextBulk (fallback)';\n      rawResult = await pagination.goNextBulk(context);\n    } else {\n      log('_advancePage: no pagination primitive available — returning false');\n      return false;\n    }\n    const didAdvance = rawResult !== undefined && validatePaginationResult(rawResult, 'Pagination Strategy');\n    const pagesJumped = typeof rawResult === 'number' ? rawResult : (didAdvance ? 1 : 0);\n    if (pagesJumped > 0) {\n      tableState.currentPageIndex += pagesJumped;\n      log(`_advancePage: ${primitive} advanced ${pagesJumped} page(s) — now at page $
