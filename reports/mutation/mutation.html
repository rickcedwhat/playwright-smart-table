const charB = b.charAt(i - 1);\n            const charA = a.charAt(j - 1);\n\n            if (charB === charA) {\n                // Exact match\n                matrix[i][j] = matrix[i - 1][j - 1];\n            } else {\n                let cost = 1;\n                // If characters match ignoring case, cost is only 0.1 (almost identical)\n                if (charB.toLowerCase() === charA.toLowerCase()) {\n                    cost = 0.1;\n                }\n\n                matrix[i][j] = Math.min(\n                    matrix[i - 1][j - 1] + cost,    // substitution\n                    matrix[i][j - 1] + 1,           // insertion\n                    matrix[i - 1][j] + 1            // deletion\n                );\n            }\n        }\n    }\n\n    return matrix[b.length][a.length];\n}\n\n/**\n * Calculate similarity score between two strings (0-1)\n * 1 = identical, 0 = completely different\n */\nexport function stringSimilarity(a: string, b: string): number {\n    // We do NOT modify case here anymore, because levenshteinDistance now handles case weighting\n    const distance = levenshteinDistance(a, b);\n    const maxLen = Math.max(a.length, b.length);\n    return maxLen === 0 ? 1 : 1 - (distance / maxLen);\n}\n\n/**\n * Find similar strings from a list\n * Returns matches above threshold, sorted by similarity\n */\nexport function findSimilar(\n    input: string,\n    available: string[],\n    threshold: number = 0.5\n): Array<"+"{ value: string; score: number }> {\n    return available\n        .map(value => ({\n            value,\n            score: stringSimilarity(input, value)\n        }))\n        .filter(x => x.score >= threshold)\n        .sort((a, b) => b.score - a.score)\n        .slice(0, 3); // Top 3 suggestions\n}\n\n/**\n * Build a helpful error message for column not found\n */\nexport function buildColumnNotFoundError(\n    columnName: string,\n    availableColumns: string[]\n): string {\n    const suggestions = findSimilar(columnName, availableColumns);\n\n    let message = `Column '${columnName}' not found`;\n\n    if (suggestions.length > 0) {\n        message += `\\n\\nDid you mean:`;\n        suggestions.forEach(({ value, score }) => {\n            const percentage = Math.round(score * 100);\n            message += `\\n  • ${value} (${percentage}% match)`;\n        });\n    }\n\n    message += `\\n\\nAvailable columns: ${availableColumns.join(', ')}`;\n    message += `\\n\\nTip: Column names are case-sensitive`;\n\n    return message;\n}\n"},"src/strategies/filter.ts":{"language":"typescript","mutants":[{"id":"904","mutatorName":"ObjectLiteral","replacement":"{}","statusReason":"Cannot read properties of undefined (reading 'apply')","status":"Killed","static":true,"testsCompleted":1,"killedBy":["48"],"coveredBy":[],"location":{"end":{"column":2,"line":49},"start":{"column":33,"line":9}}},{"id":"905","mutatorName":"ArrowFunction","replacement":"() => undefined","statusReason":"Cannot read properties of undefined (reading 'apply')","status":"Killed","static":true,"testsCompleted":3,"killedBy":["77"],"coveredBy":[],"location":{"end":{"column":23,"line":48},"start":{"column":8,"line":29}}}],"source":"import type { Locator } from '@playwright/test';\nimport type { FilterStrategy, FilterValue, TableContext } from '../types';\n\n/**\n * Example filter strategies.\n * - default: small convenience wrapper that mirrors the engine's default behavior.\n * - spy(factory): returns a strategy that marks `calledRef.called = true` when invoked.\n */\nexport const FilterStrategies = {\n  default: {\n    apply({ rows, filter, colIndex, tableContext }: {\n      rows: Locator;\n      filter: { column: string; value: FilterValue };\n      colIndex: number;\n      tableContext: TableContext;\n    }) {\n      const page = tableContext.page;\n      const resolve = tableContext.resolve;\n      const cellTemplate = resolve(tableContext.config.cellSelector as any, page);\n      const targetCell = cellTemplate.nth(colIndex);\n      if (typeof filter.value === 'function') {\n        return rows.filter({ has: (filter.value as any)(targetCell) });\n      }\n      const textVal = typeof filter.value === 'number' ? String(filter.value) : filter.value;\n      return rows.filter({ has: targetCell.getByText(textVal, { exact: true }) });\n    }\n  } as FilterStrategy,\n\n  spy: (calledRef: { called?: boolean } = {}) => ({\n    apply({ rows, filter, colIndex, tableContext }: {\n      rows: Locator;\n      filter: { column: string; value: FilterValue };\n      colIndex: number;\n      tableContext: TableContext;\n    }) {\n      calledRef.called = true;\n      // Delegate to default behaviour for actual filtering\n      const page = tableContext.page;\n      const resolve = tableContext.resolve;\n      const cellTemplate = resolve(tableContext.config.cellSelector as any, page);\n      const targetCell = cellTemplate.nth(colIndex);\n      if (typeof filter.value === 'function') {\n        return rows.filter({ has: (filter.value as any)(targetCell) });\n      }\n      const textVal = typeof filter.value === 'number' ? String(filter.value) : filter.value;\n      return rows.filter({ has: targetCell.getByText(textVal, { exact: true }) });\n    }\n  }) as FilterStrategy,\n};\n\nexport type { FilterStrategy } from '../types';\n\n"},"src/strategies/resolution.ts":{"language":"typescript","mutants":[{"id":"1072","mutatorName":"ObjectLiteral","replacement":"{}","status":"Survived","static":true,"testsCompleted":0,"coveredBy":[],"location":{"end":{"column":2,"line":51},"start":{"column":37,"line":24}}}],"source":"import { Locator, Page } from '@playwright/test';\nimport { StrategyContext } from '../types';\n\nexport interface ColumnResolutionStrategy {\n    /**\n     * Resolves a column name (string or Regex) to a column index.\n     * Returns undefined if not found.\n     */\n    resolveIndex(options: {\n        query: string | RegExp;\n        headerMap: Map<"+"string, number>;\n        context: StrategyContext\n    }): number | undefined;\n\n    /**\n     * Resolves a column name to a clean string name (for error messages or debugging).\n     */\n    resolveName(options: {\n        query: string | RegExp;\n        headerMap: Map<"+"string, number>;\n    }): string;\n}\n\nexport const ResolutionStrategies = {\n    default: {\n        resolveIndex: ({ query, headerMap }) => {\n            // 1. Exact / String Match\n            if (typeof query === 'string') {\n                if (headerMap.has(query)) return headerMap.get(query);\n            }\n\n            // 2. Regex Match\n            if (query instanceof RegExp) {\n                for (const [colName, idx] of headerMap.entries()) {\n                    if (query.test(colName)) return idx;\n                }\n                return undefined;\n            }\n\n            // 3. (Optional) Fuzzy String Match fallback could go here\n            // But for strict default strategy, we might want to keep it simple first\n            // The original code didn't do fuzzy *resolution* logic inside the get(), it just did strict get().\n            // The fuzzy logic was only for *suggestions* on error.\n            return undefined;\n        },\n\n        resolveName: ({ query }) => {\n            return query.toString();\n        }\n    } as ColumnResolutionStrategy\n};\n"}},"schemaVersion":"1.0","thresholds":{"high":80,"low":60,"break":null},"testFiles":{"tests/unit/tableMapper.unit.test.ts":{"tests":[{"id":"0","name":"TableMapper.processHeaders/getMap maps headers and applies headerTransformer"},{"id":"1","name":"TableMapper.processHeaders/getMap throws when no headers found"},{"id":"2","name":"TableMapper.processHeaders/getMap throws on duplicate headers"},{"id":"3","name":"TableMapper.processHeaders/getMap remapHeaders resets internal map"}],"source":"import { describe, it, expect, vi } from 'vitest';\nimport { TableMapper } from '../../src/engine/tableMapper';\n\ndescribe('TableMapper.processHeaders/getMap', () => {\n  const makeRootLocator = () => {\n    return {\n      scrollIntoViewIfNeeded: vi.fn().mockResolvedValue(undefined),\n      page: () => ({}),\n    } as any;\n  };\n\n  const makeResolve = (rawHeaders: string[]) => {\n    // resolve should return a locator-like object whose first().waitFor is callable\n    return (sel: any, parent: any) => {\n      return {\n        first: () => ({ waitFor: async (_: any) => { /* no-op */ } }),\n        nth: (i: number) => ({ _nth: i }),\n      } as any;\n    };\n  };\n\n  it('maps headers and applies headerTransformer', async () => {\n    const root = makeRootLocator();\n    const cfg: any = {\n      headerSelector: 'th',\n      cellSelector: 'td',\n      autoScroll: false,\n      strategies: { header: async () => [' A ', 'B'] },\n      headerTransformer: ({ text }) => text.trim().toUpperCase(),\n    };\n    const mapper = new TableMapper(root, cfg, makeResolve(['A', 'B']));\n    const map = await mapper.getMap();\n    expect(map.get('A')).toBe(0);\n    expect(map.get('B')).toBe(1);\n    expect(map.size).toBe(2);\n  });\n\n  it('throws when no headers found', async () => {\n    const root = makeRootLocator();\n    const cfg: any = {\n      headerSelector: 'th',\n      cellSelector: 'td',\n      autoScroll: false,\n      strategies: { header: async () => [] },\n    };\n    const mapper = new TableMapper(root, cfg, makeResolve([]));\n    await expect(mapper.getMap()).rejects.toThrow(/No columns found/);\n  });\n\n  it('throws on duplicate headers', async () => {\n    const root = makeRootLocator();\n    const cfg: any = {\n      headerSelector: 'th',\n      cellSelector: 'td',\n      autoScroll: false,\n      strategies: { header: async () => ['X', 'X'] },\n    };\n    const mapper = new TableMapper(root, cfg, makeResolve(['X', 'X']));\n    await expect(mapper.getMap()).rejects.toThrow(/Duplicate column names/);\n  });\n\n  it('remapHeaders resets internal map', async () => {\n    const root = makeRootLocator();\n    const cfg: any = {\n      headerSelector: 'th',\n      cellSelector: 'td',\n      autoScroll: false,\n      strategies: { header: async () => ['One'] },\n    };\n    const mapper = new TableMapper(root, cfg, makeResolve(['One']));\n    const m1 = await mapper.getMap();\n    expect(mapper.isInitialized()).toBe(true);\n    mapper.clear();\n    expect(mapper.isInitialized()).toBe(false);\n    await mapper.remapHeaders();\n    expect(mapper.isInitialized()).toBe(true);\n  });\n});\n\n"},"tests/unit/tableMapper.test.ts":{"tests":[{"id":"4","name":"TableMapper should map headers correctly"},{"id":"5","name":"TableMapper should throw error if no headers found"},{"id":"6","name":"TableMapper should throw error if duplicate headers found"},{"id":"7","name":"TableMapper should use headerTransformer to rename columns"},{"id":"8","name":"TableMapper should retry if mapping fails (simulating temporary failure)"},{"id":"9","name":"TableMapper should return cached map on subsequent calls"},{"id":"10","name":"TableMapper should check isHeaderLoading strategy"}],"source":"import { describe, it, expect, vi, beforeEach } from 'vitest';\nimport { TableMapper } from '../../src/engine/tableMapper';\nimport { FinalTableConfig, HeaderStrategy } from '../../src/types';\nimport { Locator, Page } from '@playwright/test';\n\ndescribe('TableMapper', () => {\n    let mockConfig: FinalTableConfig;\n    let mockRoot: Locator;\n    let mockResolve: any;\n    let mockHeaderLocator: any;\n\n    beforeEach(() => {\n        mockHeaderLocator = {\n            first: vi.fn().mockReturnValue({\n                waitFor: vi.fn().mockResolvedValue(undefined)\n            }),\n            nth: vi.fn().mockReturnValue({\n                innerText: vi.fn().mockResolvedValue('Mock Header Content')\n            })\n        };\n\n        mockResolve = vi.fn().mockReturnValue(mockHeaderLocator);\n\n        mockRoot = {\n            locator: vi.fn().mockReturnValue(mockHeaderLocator),\n            page: vi.fn().mockReturnValue({} as Page),\n            scrollIntoViewIfNeeded: vi.fn().mockResolvedValue(undefined)\n        } as unknown as Locator;\n\n        mockConfig = {\n            headerSelector: 'thead th',\n            strategies: {\n                loading: {} // disable smart loading for unit test simplicity\n            }\n        } as FinalTableConfig;\n    });\n\n    const createMapper = () => new TableMapper(mockRoot, mockConfig, mockResolve);\n\n    it('should map headers correctly', async () => {\n        // Mock strategy returning headers\n        mockConfig.strategies.header = vi.fn().mockResolvedValue(['ID', 'Name', 'Email']);\n\n        const mapper = createMapper();\n        const map = await mapper.getMap();\n\n        expect(map.size).toBe(3);\n        expect(map.get('ID')).toBe(0);\n        expect(map.get('Name')).toBe(1);\n        expect(map.get('Email')).toBe(2);\n    });\n\n    it('should throw error if no headers found', async () => {\n        mockConfig.strategies.header = vi.fn().mockResolvedValue([]);\n\n        const mapper = createMapper();\n        await expect(mapper.getMap(100)).rejects.toThrow(/No columns found/);\n    });\n\n    it('should throw error if duplicate headers found', async () => {\n        mockConfig.strategies.header = vi.fn().mockResolvedValue(['ID', 'Name', 'ID']);\n\n        const mapper = createMapper();\n        await expect(mapper.getMap(100)).rejects.toThrow(/Duplicate column names found: \"ID\"/);\n    });\n\n    it('should use headerTransformer to rename columns', async () => {\n        mockConfig.strategies.header = vi.fn().mockResolvedValue(['ID', 'Name', 'Name']);\n\n        // Transformer that appends index to duplicates\n        mockConfig.headerTransformer = vi.fn().mockImplementation(({ text, index, seenHeaders }) => {\n            if (seenHeaders.has(text)) {\n                return `${text}_${index}`;\n            }\n            return text;\n        });\n\n        const mapper = createMapper();\n        const map = await mapper.getMap();\n\n        expect(map.get('ID')).toBe(0);\n        expect(map.get('Name')).toBe(1);\n        expect(map.get('Name_2')).toBe(2);\n    });\n\n    it('should retry if mapping fails (simulating temporary failure)', async () => {\n        const strategy = vi.fn()\n            .mockRejectedValueOnce(new Error('DOM not ready'))\n            .mockResolvedValue(['ID', 'Name']);\n\n        mockConfig.strategies.header = strategy;\n\n        const mapper = createMapper();\n        const map = await mapper.getMap(1000); // Give it enough time to retry\n\n        expect(map.size).toBe(2);\n        expect(strategy).toHaveBeenCalledTimes(2);\n    });\n\n    it('should return cached map on subsequent calls', async () => {\n        mockConfig.strategies.header = vi.fn().mockResolvedValue(['ID']);\n        const mapper = createMapper();\n\n        const map1 = await mapper.getMap();\n        expect(mockConfig.strategies.header).toHaveBeenCalledTimes(1);\n\n        const map2 = await mapper.getMap();\n        expect(mockConfig.strategies.header).toHaveBeenCalledTimes(1); // Should not call again\n        expect(map1).toBe(map2);\n\n        // Verify synchronous access\n        expect(mapper.getMapSync()).toBe(map1);\n    });\n\n    it('should check isHeaderLoading strategy', async () => {\n        // First unstable, then stable\n        const loadingStrategy = vi.fn()\n            .mockResolvedValueOnce(true) // Loading (unstable)\n            .mockResolvedValueOnce(false); // Not loading (stable)\n\n        mockConfig.strategies.loading = {\n            isHeaderLoading: loadingStrategy\n        };\n        mockConfig.strategies.header = vi.fn().mockResolvedValue(['ID']);\n\n        const mapper = createMapper();\n        await mapper.getMap(1000);\n\n        expect(loadingStrategy).toHaveBeenCalledTimes(2);\n    });\n});\n"},"tests/unit/debugUtils.coverage.test.ts":{"tests":[{"id":"11","name":"debugUtils (merged) getDebugDelay returns correct values for various configs"},{"id":"12","name":"debugUtils (merged) debugDelay waits when delay > 0 (deterministic via fake timers)"},{"id":"13","name":"debugUtils (merged) logDebug respects logLevel and prints messages"},{"id":"14","name":"debugUtils (merged) logDebug with verbose prints verbose messages"},{"id":"15","name":"debugUtils (merged) warnIfDebugInCI warns when CI=true and slow is set"},{"id":"16","name":"Iteration engine verbose logging runMap emits \"map: starting\" under verbose"},{"id":"17","name":"Iteration engine verbose logging runMap emits \"map: complete\" under verbose"},{"id":"18","name":"Iteration engine verbose logging runForEach emits \"forEach: starting\" under verbose"},{"id":"19","name":"Iteration engine verbose logging runForEach emits \"forEach: complete\" under verbose"},{"id":"20","name":"Iteration engine verbose logging runFilter emits \"filter: starting\" and \"filter: complete\" under verbose"},{"id":"21","name":"Iteration engine verbose logging runForEach emits \"stop() called\" when stop is invoked"},{"id":"22","name":"Iteration engine verbose logging runForEach emits \"advancing to next page\" when multiple pages configured"},{"id":"23","name":"Iteration engine verbose logging runMap logs no [SmartTable] messages under logLevel \"none\""},{"id":"24","name":"Iteration engine verbose logging runForEach emits \"dedupe skip\" when dedupe key is repeated"}],"source":"import { describe, it, expect, vi, beforeEach, afterEach } from 'vitest';\nimport { getDebugDelay, debugDelay, logDebug, warnIfDebugInCI } from '../../src/utils/debugUtils';\n\n// ─── Mock ElementTracker so tests don't need a browser ───────────────────────\n// getUnseenIndices is stubbed to return [0, 1, ...pageRows.length-1] on first\n// call and [] on subsequent calls (simulates: first page = all rows, then done).\nvi.mock('../../src/utils/elementTracker', () => {\n  return {\n    ElementTracker: class {\n      private _called = false;\n      async getUnseenIndices(locators: any) {\n        if (this._called) return [];\n        this._called = true;\n        // Return indices 0..n-1 matching how many rows the env exposes via .all()\n        const rows = await locators.all();\n        return rows.map((_: any, i: number) => i);\n      }\n      async cleanup() { }\n    }\n  };\n});\n\n// Import AFTER mock is declared (vi.mock is hoisted but imports are resolved post-hoist)\nimport { runForEach, runMap, runFilter } from '../../src/engine/tableIteration';\nimport type { TableIterationEnv } from '../../src/engine/tableIteration';\nimport type { FinalTableConfig } from '../../src/types';\n\n// ─── debugUtils baseline tests ────────────────────────────────────────────────\n\ndescribe('debugUtils (merged)', () => {\n  it('getDebugDelay returns correct values for various configs', () => {\n    const cfg1: any = {};\n    expect(getDebugDelay(cfg1, 'default')).toBe(0);\n\n    const cfg2: any = { debug: { slow: 100 } };\n    expect(getDebugDelay(cfg2, 'pagination')).toBe(100);\n\n    const cfg3: any = { debug: { slow: { pagination: 50, default: 5 } } };\n    expect(getDebugDelay(cfg3, 'pagination')).toBe(50);\n    expect(getDebugDelay(cfg3, 'getCell')).toBe(5);\n  });\n\n  it('debugDelay waits when delay > 0 (deterministic via fake timers)', async () => {\n    vi.useFakeTimers();\n    const p = debugDelay({ debug: { slow: 50 } } as any, 'default');\n    vi.advanceTimersByTime(60);\n    await p;\n    vi.useRealTimers();\n  });\n\n  it('logDebug respects logLevel and prints messages', () => {\n    const spy = vi.spyOn(console, 'log').mockImplementation(() => { });\n    logDebug({ debug: { logLevel: 'info' } } as any, 'info', 'hello', { foo: 'bar' });\n    expect(spy).toHaveBeenCalled();\n    spy.mockRestore();\n  });\n\n  it('logDebug with verbose prints verbose messages', () => {\n    const spy = vi.spyOn(console, 'log').mockImplementation(() => { });\n    logDebug({ debug: { logLevel: 'verbose' } } as any, 'verbose', 'detail');\n    expect(spy).toHaveBeenCalled();\n    spy.mockRestore();\n  });\n\n  it('warnIfDebugInCI warns when CI=true and slow is set', () => {\n    const spy = vi.spyOn(console, 'warn').mockImplementation(() => { });\n    process.env.CI = 'true';\n    warnIfDebugInCI({ debug: { slow: 100 } } as any);\n    expect(spy).toHaveBeenCalled();\n    spy.mockRestore();\n    delete process.env.CI;\n  });\n});\n\n// ─── Iteration engine verbose logging tests ───────────────────────────────────\n\nfunction makeVerboseConfig(overrides: Partial<"+"FinalTableConfig> = {}): FinalTableConfig {\n  return {\n    rowSelector: 'tr',\n    headerSelector: 'th',\n    cellSelector: 'td',\n    maxPages: 1,\n    autoScroll: false,\n    headerTransformer: ({ text }: any) => text,\n    onReset: async () => { },\n    strategies: {},\n    debug: { logLevel: 'verbose' },\n    ...overrides,\n  } as any;\n}\n\n/**\n * Build a minimal TableIterationEnv with fake rows.\n * getRowLocators() returns an object whose .all() resolves to fake row objects.\n * The mocked ElementTracker (above) will return all indices on the first call, [] thereafter.\n */\nfunction makeEnv(\n  rowData: Record<"+"string, string>[],\n  config: FinalTableConfig,\n  pagesTotal = 1,\n  dedupeStrategy?: (row: any) => Promise<"+"string>\n): TableIterationEnv<"+"any> {\n  let pagesAdvanced = 0;\n\n  if (dedupeStrategy) {\n    (config as any).strategies = { dedupe: dedupeStrategy };\n  }\n\n  return {\n    getRowLocators: () => ({\n      all: async () => rowData.map((data, i) => ({ _data: data, _index: i })),\n    }) as any,\n    getMap: () => new Map([['Name', 0]]),\n    advancePage: async () => {\n      pagesAdvanced++;\n      return pagesAdvanced <"+" pagesTotal;\n    },\n    makeSmartRow: (_loc: any, _map: any, idx: number) =>\n      ({ rowIndex: idx, getCell: () => ({}), toJSON: async () => rowData[idx] }) as any,\n    createSmartRowArray: (arr: any[]) => arr as any,\n    config,\n    getPage: () => ({ evaluate: async () => { } } as any),\n  };\n}\n\ndescribe('Iteration engine verbose logging', () => {\n  let logSpy: ReturnType<"+"typeof vi.spyOn>;\n  let loggedMessages: string[];\n\n  beforeEach(() => {\n    loggedMessages = [];\n    logSpy = vi.spyOn(console, 'log').mockImplementation((...args: any[]) => {\n      loggedMessages.push(args.join(' '));\n    });\n  });\n\n  afterEach(() => {\n    logSpy.mockRestore();\n  });\n\n  it('runMap emits \"map: starting\" under verbose', async () => {\n    const env = makeEnv([], makeVerboseConfig());\n    await runMap(env, async () => 'x');\n    expect(loggedMessages.some(m => m.includes('map: starting'))).toBe(true);\n  });\n\n  it('runMap emits \"map: complete\" under verbose', async () => {\n    const env = makeEnv([], makeVerboseConfig());\n    await runMap(env, async () => 'x');\n    expect(loggedMessages.some(m => m.includes('map: complete'))).toBe(true);\n  });\n\n  it('runForEach emits \"forEach: starting\" under verbose', async () => {\n    const env = makeEnv([], makeVerboseConfig());\n    await runForEach(env, async () => { });\n    expect(loggedMessages.some(m => m.includes('forEach: starting'))).toBe(true);\n  });\n\n  it('runForEach emits \"forEach: complete\" under verbose', async () => {\n    const env = makeEnv([], makeVerboseConfig());\n    await runForEach(env, async () => { });\n    expect(loggedMessages.some(m => m.includes('forEach: complete'))).toBe(true);\n  });\n\n  it('runFilter emits \"filter: starting\" and \"filter: complete\" under verbose', async () => {\n    const env = makeEnv([], makeVerboseConfig());\n    await runFilter(env, async () => true);\n    expect(loggedMessages.some(m => m.includes('filter: starting'))).toBe(true);\n    expect(loggedMessages.some(m => m.includes('filter: complete'))).toBe(true);\n  });\n\n  it('runForEach emits \"stop() called\" when stop is invoked', async () => {\n    const env = makeEnv([{ Name: 'A' }, { Name: 'B' }], makeVerboseConfig());\n    await runForEach(env, async ({ stop }) => {\n      stop();\n    });\n    expect(loggedMessages.some(m => m.includes('stop() called'))).toBe(true);\n  });\n\n  it('runForEach emits \"advancing to next page\" when multiple pages configured', async () => {\n    const env = makeEnv([], makeVerboseConfig({ maxPages: 2 } as any), 2);\n    await runForEach(env, async () => { });\n    expect(loggedMessages.some(m => m.includes('advancing to next page'))).toBe(true);\n  });\n\n  it('runMap logs no [SmartTable] messages under logLevel \"none\"', async () => {\n    const config = makeVerboseConfig();\n    (config as any).debug = { logLevel: 'none' };\n    const env = makeEnv([], config);\n    await runMap(env, async () => 'x');\n    const smartTableLogs = loggedMessages.filter(m => m.includes('[SmartTable]'));\n    expect(smartTableLogs.length).toBe(0);\n  });\n\n  it('runForEach emits \"dedupe skip\" when dedupe key is repeated', async () => {\n    const dedupeStrategy = async (_row: any) => 'same-key';\n    const config = makeVerboseConfig();\n    const env = makeEnv([{ Name: 'A' }, { Name: 'B' }], config, 1, dedupeStrategy);\n    await runForEach(env, async () => { });\n    expect(loggedMessages.some(m => m.includes('dedupe skip'))).toBe(true);\n  });\n});\n"},"tests/unit/filterEngine.test.ts":{"tests":[{"id":"25","name":"FilterEngine applyFilters should return original rows if no filters provided"},{"id":"26","name":"FilterEngine applyFilters should throw error if column not found"},{"id":"27","name":"FilterEngine applyFilters should chain .filter() for each criteria"},{"id":"28","name":"FilterEngine pluggable strategy delegates to strategies.filter.apply when present"}],"source":"import { describe, it, expect, vi } from 'vitest';\nimport { FilterEngine } from '../../src/filterEngine';\nimport { FinalTableConfig } from '../../src/types';\nimport { Page, Locator } from '@playwright/test';\n\ndescribe('FilterEngine', () => {\n    // Mock Config\n    const mockConfig = {\n        cellSelector: 'td',\n    } as FinalTableConfig;\n\n    // Mock Locator factory\n    const createMockLocator = (name: string = 'locator') => {\n        const methods = {\n            filter: vi.fn().mockReturnThis(),\n            nth: vi.fn().mockReturnThis(),\n            getByText: vi.fn().mockReturnThis(),\n            locator: vi.fn().mockReturnThis(),\n            first: vi.fn().mockReturnThis(),\n            all: vi.fn().mockResolvedValue([]),\n            toString: () => name\n        };\n        // Allow chaining to return new instances if needed, but for now returning 'this' (the methods object) is enough for simple chaining checks\n        // deeper chaining might need recursive mocks\n        return methods as unknown as Locator;\n    };\n\n    // Recursive Mock Locator\n    const createRecursiveMockLocator = (name: string) => {\n        const mock: any = {\n            _name: name,\n            filter: vi.fn(),\n            nth: vi.fn(),\n            getByText: vi.fn(),\n            locator: vi.fn(),\n        };\n\n        mock.filter.mockReturnValue(mock);\n        mock.nth.mockReturnValue(mock);\n        mock.getByText.mockReturnValue(mock);\n        mock.locator.mockReturnValue(mock);\n\n        return mock as unknown as Locator;\n    };\n\n    // Mock Page\n    const mockPage = {\n        locator: vi.fn()\n    } as unknown as Page;\n\n    // Mock Resolve\n    const mockResolve = vi.fn();\n\n    describe('applyFilters', () => {\n        it('should return original rows if no filters provided', () => {\n            const engine = new FilterEngine(mockConfig, mockResolve);\n            const baseRows = createMockLocator('baseRows');\n            const map = new Map<"+"string, number>();\n\n            const result = engine.applyFilters(baseRows, {}, map, false, mockPage);\n            expect(result).toBe(baseRows);\n        });\n\n        it('should throw error if column not found', () => {\n            const engine = new FilterEngine(mockConfig, mockResolve);\n            const baseRows = createMockLocator('baseRows');\n            const map = new Map<"+"string, number>([['Name', 0]]);\n\n            expect(() => {\n                engine.applyFilters(baseRows, { 'Age': '30' }, map, false, mockPage);\n            }).toThrow(/Column 'Age' not found/);\n        });\n\n        it('should chain .filter() for each criteria', () => {\n            const engine = new FilterEngine(mockConfig, mockResolve);\n            const baseRows = createRecursiveMockLocator('baseRows');\n            const map = new Map<"+"string, number>([\n                ['Name', 0],\n                ['Role', 1]\n            ]);\n\n            // Setup mock for cell resolution\n            const mockCellParam = createRecursiveMockLocator('cellParam');\n            mockResolve.mockReturnValue(mockCellParam);\n\n            const result = engine.applyFilters(baseRows, { 'Name': 'John', 'Role': 'Admin' }, map, true, mockPage);\n\n            // Verify resolve called for cell template\n            expect(mockResolve).toHaveBeenCalledWith(mockConfig.cellSelector, mockPage);\n\n            // Verify filter called twice\n            const baseMock = baseRows as any;\n            expect(baseMock.filter).toHaveBeenCalledTimes(2);\n\n            // Verify nth and getByText called on the cell template\n            // We can't easily inspect the arguments of 'has' because it's a Locator object, \n            // but we can verify that the cell template interactions happened.\n            const cellMock = mockCellParam as any;\n\n            // Check calls for \"Name\" (index 0, value 'John')\n            expect(cellMock.nth).toHaveBeenCalledWith(0);\n            expect(cellMock.getByText).toHaveBeenCalledWith('John', { exact: true });\n\n            // Check calls for \"Role\" (index 1, value 'Admin')\n            expect(cellMock.nth).toHaveBeenCalledWith(1);\n            expect(cellMock.getByText).toHaveBeenCalledWith('Admin', { exact: true });\n        });\n    });\n});\n \ndescribe('FilterEngine pluggable strategy', () => {\n    it('delegates to strategies.filter.apply when present', () => {\n        const fakeFiltered: any = { filter: vi.fn() };\n        const strategy = {\n            apply: vi.fn().mockReturnValue(fakeFiltered)\n        };\n\n        const config: any = {\n            cellSelector: 'td',\n            strategies: { filter: strategy }\n        };\n\n        const resolve = vi.fn();\n        const engine = new FilterEngine(config, resolve as any);\n\n        const baseRows: any = { filter: vi.fn().mockReturnThis() };\n        const map = new Map([['Name', 0]]);\n\n        const out = engine.applyFilters(baseRows as any, { Name: 'X' }, map, true, {} as any, {} as any);\n        expect(strategy.apply).toHaveBeenCalled();\n        expect(out).toBe(fakeFiltered);\n    });\n});\n"},"tests/unit/paginationPath.test.ts":{"tests":[{"id":"29","name":"planNavigationPath same page returns empty path when current equals target"},{"id":"30","name":"planNavigationPath when goToPage is present returns single goToPage step"},{"id":"31","name":"planNavigationPath forward (target > current) uses only goNext when no bulk"},{"id":"32","name":"planNavigationPath forward (target > current) uses goNext only when bulk would overshoot and no goPrevious (3→12, bulk 10)"},{"id":"33","name":"planNavigationPath forward (target > current) uses goNextBulk + goPrevious when overshoot is cheaper and goPrevious exists (3→12, bulk 10)"},{"id":"34","name":"planNavigationPath forward (target > current) uses goNextBulk then goNext for exact remainder (3→35, bulk 10)"},{"id":"35","name":"planNavigationPath forward (target > current) uses only goNext when steps less than bulk size (0→5, bulk 10)"},{"id":"36","name":"planNavigationPath backward (target <"+" current) uses only goPrevious when no bulk"},{"id":"37","name":"planNavigationPath backward (target <"+" current) uses goPrevious only when bulk would overshoot and no goNext (12→3, bulk 10)"},{"id":"38","name":"planNavigationPath backward (target <"+" current) uses goPreviousBulk once when exact (13→3, bulk 10)"},{"id":"39","name":"planNavigationPath backward (target <"+" current) uses goPreviousBulk then goPrevious when remainder is small (15→3, bulk 10)"},{"id":"40","name":"planNavigationPath backward (target <"+" current) uses goPreviousBulk + goNext when overshoot is cheaper (19→3, bulk 10)"},{"id":"41","name":"planNavigationPath backward (target <"+" current) uses goPreviousBulk then goPrevious for exact remainder (35→3, bulk 10)"},{"id":"42","name":"planNavigationPath no primitives or missing direction returns empty when no primitives"},{"id":"43","name":"planNavigationPath no primitives or missing direction returns empty when going backward with no goPrevious or goPreviousBulk"},{"id":"44","name":"planNavigationPath no primitives or missing direction returns empty when going forward with no goNext or goNextBulk"},{"id":"45","name":"executeNavigationWithGoToPageRetry uses goNext only (not goNextBulk) when bulk would overshoot and goPrevious is missing (3→12)"},{"id":"46","name":"executeNavigationWithGoToPageRetry uses goNextBulk when it would not overshoot (3→38)"},{"id":"47","name":"executeNavigationWithGoToPageRetry stops when current equals target after stepping (goToPage false then one goNext)"}],"source":"import { describe, it, expect, vi, beforeEach } from 'vitest';\nimport {\n  planNavigationPath,\n  executeNavigationWithGoToPageRetry,\n} from '../../src/utils/paginationPath';\nimport type { PaginationPrimitives, TableContext } from '../../src/types';\n\ndescribe('planNavigationPath', () => {\n  const noPrimitives: PaginationPrimitives = {};\n  const nextOnly: PaginationPrimitives = { goNext: async () => true };\n  const prevOnly: PaginationPrimitives = { goPrevious: async () => true };\n  const nextAndPrev: PaginationPrimitives = {\n    goNext: async () => true,\n    goPrevious: async () => true,\n  };\n  const bulk10NoPrev: PaginationPrimitives = {\n    goNext: async () => true,\n    goNextBulk: async () => 10,\n    nextBulkPages: 10,\n  };\n  const bulk10WithPrev: PaginationPrimitives = {\n    goNext: async () => true,\n    goPrevious: async () => true,\n    goNextBulk: async () => 10,\n    goPreviousBulk: async () => 10,\n    nextBulkPages: 10,\n    previousBulkPages: 10,\n  };\n  const withGoToPage: PaginationPrimitives = {\n    goToPage: async () => true,\n    goNext: async () => true,\n    goPrevious: async () => true,\n  };\n\n  describe('same page', () => {\n    it('returns empty path when current equals target', () => {\n      expect(planNavigationPath(5, 5, nextAndPrev)).toEqual([]);\n    });\n  });\n\n  describe('when goToPage is present', () => {\n    it('returns single goToPage step', () => {\n      expect(planNavigationPath(0, 38, withGoToPage)).toEqual([\n        { type: 'goToPage', pageIndex: 38 },\n      ]);\n      expect(planNavigationPath(10, 2, withGoToPage)).toEqual([\n        { type: 'goToPage', pageIndex: 2 },\n      ]);\n    });\n  });\n\n  describe('forward (target > current)', () => {\n    it('uses only goNext when no bulk', () => {\n      expect(planNavigationPath(0, 5, nextOnly)).toEqual([\n        { type: 'goNext', count: 5 },\n      ]);\n    });\n\n    it('uses goNext only when bulk would overshoot and no goPrevious (3→12, bulk 10)', () => {\n      const path = planNavigationPath(3, 12, bulk10NoPrev);\n      expect(path).toEqual([{ type: 'goNext', count: 9 }]);\n      expect(path.some((s) => s.type === 'goNextBulk')).toBe(false);\n    });\n\n    it('uses goNextBulk + goPrevious when overshoot is cheaper and goPrevious exists (3→12, bulk 10)', () => {\n      const path = planNavigationPath(3, 12, bulk10WithPrev);\n      expect(path).toEqual([\n        { type: 'goNextBulk', count: 1 },\n        { type: 'goPrevious', count: 1 },\n      ]);\n    });\n\n    it('uses goNextBulk then goNext for exact remainder (3→35, bulk 10)', () => {\n      expect(planNavigationPath(3, 35, bulk10WithPrev)).toEqual([\n        { type: 'goNextBulk', count: 3 },\n        { type: 'goNext', count: 2 },\n      ]);\n    });\n\n    it('uses only goNext when steps less than bulk size (0→5, bulk 10)', () => {\n      expect(planNavigationPath(0, 5, bulk10WithPrev)).toEqual([\n        { type: 'goNext', count: 5 },\n      ]);\n    });\n  });\n\n  describe('backward (target <"+" current)', () => {\n    it('uses only goPrevious when no bulk', () => {\n      expect(planNavigationPath(5, 0, prevOnly)).toEqual([\n        { type: 'goPrevious', count: 5 },\n      ]);\n    });\n\n    it('uses goPrevious only when bulk would overshoot and no goNext (12→3, bulk 10)', () => {\n      const path = planNavigationPath(12, 3, {\n        goPrevious: async () => true,\n        goPreviousBulk: async () => 10,\n        previousBulkPages: 10,\n      });\n      expect(path).toEqual([{ type: 'goPrevious', count: 9 }]);\n      expect(path.some((s) => s.type === 'goPreviousBulk')).toBe(false);\n    });\n\n    it('uses goPreviousBulk once when exact (13→3, bulk 10)', () => {\n      const path = planNavigationPath(13, 3, bulk10WithPrev);\n      expect(path).toEqual([{ type: 'goPreviousBulk', count: 1 }]);\n    });\n\n    it('uses goPreviousBulk then goPrevious when remainder is small (15→3, bulk 10)', () => {\n      const path = planNavigationPath(15, 3, bulk10WithPrev);\n      expect(path).toEqual([\n        { type: 'goPreviousBulk', count: 1 },\n        { type: 'goPrevious', count: 2 },\n      ]);\n    });\n\n    it('uses goPreviousBulk + goNext when overshoot is cheaper (19→3, bulk 10)', () => {\n      const path = planNavigationPath(19, 3, bulk10WithPrev);\n      expect(path).toEqual([\n        { type: 'goPreviousBulk', count: 2 },\n        { type: 'goNext', count: 4 },\n      ]);\n    });\n\n    it('uses goPreviousBulk then goPrevious for exact remainder (35→3, bulk 10)', () => {\n      expect(planNavigationPath(35, 3, bulk10WithPrev)).toEqual([\n        { type: 'goPreviousBulk', count: 3 },\n        { type: 'goPrevious', count: 2 },\n      ]);\n    });\n  });\n\n  describe('no primitives or missing direction', () => {\n    it('returns empty when no primitives', () => {\n      expect(planNavigationPath(0, 5, noPrimitives)).toEqual([]);\n    });\n\n    it('returns empty when going backward with no goPrevious or goPreviousBulk', () => {\n      expect(planNavigationPath(5, 0, nextOnly)).toEqual([]);\n    });\n\n    it('returns empty when going forward with no goNext or goNextBulk', () => {\n      expect(planNavigationPath(0, 5, prevOnly)).toEqual([]);\n    });\n  });\n});\n\ndescribe('executeNavigationWithGoToPageRetry', () => {\n  const mockContext = {} as TableContext;\n\n  beforeEach(() => {\n    vi.clearAllMocks();\n  });\n\n  it('uses goNext only (not goNextBulk) when bulk would overshoot and goPrevious is missing (3→12)', async () => {\n    const goToPage = vi.fn().mockResolvedValue(false);\n    const goNext = vi.fn().mockResolvedValue(true);\n    const goNextBulk = vi.fn().mockResolvedValue(10);\n    let current = 3;\n    const getCurrentPage = () => current;\n    const setCurrentPage = (n: number) => {\n      current = n;\n    };\n\n    const primitives: PaginationPrimitives = {\n      goToPage,\n      goNext,\n      goNextBulk,\n      nextBulkPages: 10,\n      // no goPrevious\n    };\n\n    await executeNavigationWithGoToPageRetry(\n      12,\n      primitives,\n      mockContext,\n      getCurrentPage,\n      setCurrentPage\n    );\n\n    expect(current).toBe(12);\n    expect(goNextBulk).not.toHaveBeenCalled();\n    expect(goNext).toHaveBeenCalledTimes(9);\n  });\n\n  it('uses goNextBulk when it would not overshoot (3→38)', async () => {\n    const goToPage = vi.fn().mockResolvedValue(false);\n    const goNext = vi.fn().mockResolvedValue(true);\n    const goNextBulk = vi.fn().mockResolvedValue(10);\n    let current = 3;\n    const getCurrentPage = () => current;\n    const setCurrentPage = (n: number) => {\n      current = n;\n    };\n\n    const primitives: PaginationPrimitives = {\n      goToPage,\n      goNext,\n      goNextBulk,\n      nextBulkPages: 10,\n    };\n\n    await executeNavigationWithGoToPageRetry(\n      38,\n      primitives,\n      mockContext,\n      getCurrentPage,\n      setCurrentPage\n    );\n\n    expect(current).toBe(38);\n    expect(goNextBulk).toHaveBeenCalledTimes(3);\n    expect(goNext).toHaveBeenCalledTimes(5);\n  });\n\n  it('stops when current equals target after stepping (goToPage false then one goNext)', async () => {\n    const goToPage = vi.fn().mockResolvedValue(false);\n    const goNext = vi.fn().mockResolvedValue(true);\n    let current = 0;\n    const getCurrentPage = () => current;\n    const setCurrentPage = (n: number) => {\n      current = n;\n    };\n\n    const primitives: PaginationPrimitives = {\n      goToPage,\n      goNext,\n      nextBulkPages: 10,\n    };\n\n    await executeNavigationWithGoToPageRetry(\n      1,\n      primitives,\n      mockContext,\n      getCurrentPage,\n      setCurrentPage\n    );\n\n    expect(goToPage).toHaveBeenCalledTimes(1);\n    expect(goNext).toHaveBeenCalledTimes(1);\n    expect(current).toBe(1);\n  });\n});\n"},"tests/unit/filterStrategy.unit.test.ts":{"tests":[{"id":"48","name":"FilterStrategies.default applies text-based filter by delegating to Playwright locators"}],"source":"import { describe, it, expect, vi } from 'vitest';\nimport { FilterStrategies } from '../../src/strategies/filter';\nimport type { TableContext } from '../../src/types';\nimport type { Locator, Page } from '@playwright/test';\n\ndescribe('FilterStrategies.default', () => {\n  const createRecursiveMockLocator = (name: string) => {\n    const mock: any = {\n      _name: name,\n      filter: vi.fn(),\n      nth: vi.fn(),\n      getByText: vi.fn(),\n      locator: vi.fn(),\n    };\n    mock.filter.mockReturnValue(mock);\n    mock.nth.mockReturnValue(mock);\n    mock.getByText.mockReturnValue(mock);\n    mock.locator.mockReturnValue(mock);\n    return mock as unknown as Locator;\n  };\n\n  const mockPage = {} as unknown as Page;\n\n  it('applies text-based filter by delegating to Playwright locators', () => {\n    const baseRows = createRecursiveMockLocator('rows');\n    const cellTemplate = createRecursiveMockLocator('cellTemplate');\n    const resolve = vi.fn().mockReturnValue(cellTemplate);\n\n    const ctx: TableContext = {\n      root: {} as any,\n      config: { cellSelector: 'td' } as any,\n      page: mockPage,\n      resolve,\n    };\n\n    const result = FilterStrategies.default.apply({\n      rows: baseRows as unknown as Locator,\n      filter: { column: 'Name', value: 'Alice' },\n      colIndex: 0,\n      tableContext: ctx,\n    } as any);\n\n    const baseMock: any = baseRows;\n    expect(baseMock.filter).toHaveBeenCalledTimes(1);\n    expect(cellTemplate.nth).toHaveBeenCalledWith(0);\n    expect(cellTemplate.getByText).toHaveBeenCalledWith('Alice', { exact: true });\n  });\n});\n\n"},"tests/unit/paginationPath.coverage.test.ts":{"tests":[{"id":"49","name":"planNavigationPath - comprehensive returns empty for same page"},{"id":"50","name":"planNavigationPath - comprehensive prefers goToPage when available"},{"id":"51","name":"planNavigationPath - comprehensive forward: uses goNext when no bulk"},{"id":"52","name":"planNavigationPath - comprehensive forward: uses bulk+previous when overshoot cheaper"},{"id":"53","name":"planNavigationPath - comprehensive backward: uses goPrevious when no bulk"},{"id":"54","name":"executeNavigationWithGoToPageRetry - behaviors & edge cases returns immediately when no goToPage"},{"id":"55","name":"executeNavigationWithGoToPageRetry - behaviors & edge cases throws when goToPage false and no stepping primitives (forward)"},{"id":"56","name":"executeNavigationWithGoToPageRetry - behaviors & edge cases throws when goToPage false and no stepping primitives (backward)"},{"id":"57","name":"executeNavigationWithGoToPageRetry - behaviors & edge cases uses goPreviousBulk numeric return to step back"},{"id":"58","name":"executeNavigationWithGoToPageRetry - behaviors & edge cases advances using goNextBulk numeric return"},{"id":"59","name":"executeNavigationPath - failure modes & updates runs goNext/goPrevious and updates current page"},{"id":"60","name":"executeNavigationPath - failure modes & updates throws when goToPage primitive fails"},{"id":"61","name":"executeNavigationPath - failure modes & updates throws when goNextBulk fails"},{"id":"62","name":"executeNavigationPath - failure modes & updates throws when goPreviousBulk fails"}],"source":"import { describe, it, expect } from 'vitest';\nimport {\n  planNavigationPath,\n  executeNavigationWithGoToPageRetry,\n  executeNavigationPath,\n} from '../../src/utils/paginationPath';\nimport type { PaginationPrimitives, TableContext } from '../../src/types';\n\ndescribe('planNavigationPath - comprehensive', () => {\n  it('returns empty for same page', () => {\n    expect(planNavigationPath(2, 2, {} as any)).toEqual([]);\n  });\n\n  it('prefers goToPage when available', () => {\n    const p: PaginationPrimitives = { goToPage: async () => true };\n    expect(planNavigationPath(0, 10, p)).toEqual([{ type: 'goToPage', pageIndex: 10 }]);\n  });\n\n  it('forward: uses goNext when no bulk', () => {\n    const p: PaginationPrimitives = { goNext: async () => true };\n    expect(planNavigationPath(0, 5, p)).toEqual([{ type: 'goNext', count: 5 }]);\n  });\n\n  it('forward: uses bulk+previous when overshoot cheaper', () => {\n    const p: PaginationPrimitives = {\n      goNextBulk: async () => 10,\n      nextBulkPages: 10,\n      goPrevious: async () => true,\n      goPreviousBulk: async () => 10,\n      previousBulkPages: 10,\n    };\n    const path = planNavigationPath(3, 12, p);\n    expect(path.length).toBeGreaterThan(0);\n    expect(path[0].type).toBe('goNextBulk');\n  });\n\n  it('backward: uses goPrevious when no bulk', () => {\n    const p: PaginationPrimitives = { goPrevious: async () => true };\n    expect(planNavigationPath(5, 0, p)).toEqual([{ type: 'goPrevious', count: 5 }]);\n  });\n});\n\ndescribe('executeNavigationWithGoToPageRetry - behaviors & edge cases', () => {\n  const mockContext = {} as TableContext;\n\n  it('returns immediately when no goToPage', async () => {\n    const primitives: PaginationPrimitives = {};\n    let current = 0;\n    await executeNavigationWithGoToPageRetry(5, primitives, mockContext, () => current, (n) => { current = n; });\n    expect(current).toBe(0);\n  });\n\n  it('throws when goToPage false and no stepping primitives (forward)', async () => {\n    const primitives: PaginationPrimitives = {\n      goToPage: async () => false,\n    };\n    let current = 0;\n    await expect(\n      executeNavigationWithGoToPageRetry(1, primitives, mockContext, () => current, (n) => { current = n; })\n    ).rejects.toThrow(/no goNext\\/goNextBulk/);\n  });\n\n  it('throws when goToPage false and no stepping primitives (backward)', async () => {\n    const primitives: PaginationPrimitives = {\n      goToPage: async () => false,\n    };\n    let current = 5;\n    await expect(\n      executeNavigationWithGoToPageRetry(3, primitives, mockContext, () => current, (n) => { current = n; })\n    ).rejects.toThrow(/no goPrevious\\/goPreviousBulk/);\n  });\n\n  it('uses goPreviousBulk numeric return to step back', async () => {\n    let current = 10;\n    const primitives: PaginationPrimitives = {\n      goToPage: async () => false,\n      goPreviousBulk: async () => 3,\n      previousBulkPages: 3,\n      goPrevious: async () => true,\n    };\n    await executeNavigationWithGoToPageRetry(1, primitives, mockContext, () => current, (n) => { current = n; });\n    expect(current).toBeLessThan(10);\n  });\n\n  it('advances using goNextBulk numeric return', async () => {\n    let current = 3;\n    const primitives: PaginationPrimitives = {\n      goToPage: async () => false,\n      goNextBulk: async () => 5,\n      nextBulkPages: 5,\n      goNext: async () => true,\n    };\n    await executeNavigationWithGoToPageRetry(\n      20,\n      primitives,\n      mockContext,\n      () => current,\n      (n) => { current = n; }\n    );\n    expect(current).toBeGreaterThan(3);\n  });\n});\n\ndescribe('executeNavigationPath - failure modes & updates', () => {\n  it('runs goNext/goPrevious and updates current page', async () => {\n    const calls: string[] = [];\n    const primitives: any = {\n      goNext: async () => { calls.push('next'); return true; },\n      goPrevious: async () => { calls.push('prev'); return true; },\n      goNextBulk: async () => 1,\n      goPreviousBulk: async () => 1,\n      goToPage: async () => true\n    };\n\n    let current = 2;\n    const path = [\n      { type: 'goNext', count: 2 } as any,\n      { type: 'goPrevious', count: 1 } as any\n    ];\n\n    await executeNavigationPath(path, primitives, {} as any, () => current, (n) => { current = n; });\n    expect(current).toBe(3);\n  });\n\n  it('throws when goToPage primitive fails', async () => {\n    const primitives: any = {\n      goToPage: async () => false,\n    };\n    let current = 0;\n    const path = [{ type: 'goToPage', pageIndex: 5 } as any];\n    await expect(executeNavigationPath(path, primitives, {} as any, () => current, (n) => { current = n; })).rejects.toThrow(/goToPage\\(5\\) failed/);\n  });\n\n  it('throws when goNextBulk fails', async () => {\n    const primitives: any = {\n      goNextBulk: async () => false,\n    };\n    let current = 0;\n    const path = [{ type: 'goNextBulk', count: 1 } as any];\n    await expect(executeNavigationPath(path, primitives, {} as any, () => current, (n) => { current = n; })).rejects.toThrow(/goNextBulk failed/);\n  });\n\n  it('throws when goPreviousBulk fails', async () => {\n    const primitives: any = {\n      goPreviousBulk: async () => false,\n    };\n    let current = 5;\n    const path = [{ type: 'goPreviousBulk', count: 1 } as any];\n    await expect(executeNavigationPath(path, primitives, {} as any, () => current, (n) => { current = n; })).rejects.toThrow(/goPreviousBulk failed/);\n  });\n});\n\n"},"tests/unit/validation.test.ts":{"tests":[{"id":"63","name":"validatePaginationResult returns true for boolean true"},{"id":"64","name":"validatePaginationResult returns false for boolean false"},{"id":"65","name":"validatePaginationResult returns true for positive number (pages jumped)"},{"id":"66","name":"validatePaginationResult returns false for number 0"},{"id":"67","name":"validatePaginationResult throws for invalid types"},{"id":"68","name":"validatePaginationResult uses strategy name in error message"},{"id":"69","name":"validateSortingStrategy throws for non-object"},{"id":"70","name":"validateSortingStrategy throws when doSort missing"},{"id":"71","name":"validateSortingStrategy throws when getSortState missing"},{"id":"72","name":"validateSortingStrategy returns true for valid strategy"},{"id":"73","name":"validateFillStrategy throws when not a function"},{"id":"74","name":"validateFillStrategy returns true for function"}],"source":"import { describe, it, expect } from 'vitest';\nimport { validatePaginationResult, validateSortingStrategy, validateFillStrategy } from '../../src/strategies/validation';\n\ndescribe('validatePaginationResult', () => {\n  it('returns true for boolean true', () => {\n    expect(validatePaginationResult(true)).toBe(true);\n  });\n\n  it('returns false for boolean false', () => {\n    expect(validatePaginationResult(false)).toBe(false);\n  });\n\n  it('returns true for positive number (pages jumped)', () => {\n    expect(validatePaginationResult(1)).toBe(true);\n    expect(validatePaginationResult(5)).toBe(true);\n    expect(validatePaginationResult(10)).toBe(true);\n  });\n\n  it('returns false for number 0', () => {\n    expect(validatePaginationResult(0)).toBe(false);\n  });\n\n  it('throws for invalid types', () => {\n    expect(() => validatePaginationResult(undefined)).toThrow(\n      /Pagination strategy must return a boolean.*or a number/\n    );\n    expect(() => validatePaginationResult(null)).toThrow(\n      /Pagination strategy must return/\n    );\n    expect(() => validatePaginationResult('true')).toThrow(\n      /Received: string/\n    );\n    expect(() => validatePaginationResult({})).toThrow(\n      /Received: object/\n    );\n  });\n\n  it('uses strategy name in error message', () => {\n    expect(() => validatePaginationResult(undefined, 'MyStrategy')).toThrow(\n      /\\[MyStrategy\\]/\n    );\n  });\n});\n\ndescribe('validateSortingStrategy', () => {\n  it('throws for non-object', () => {\n    expect(() => validateSortingStrategy(null as any)).toThrow();\n  });\n  it('throws when doSort missing', () => {\n    expect(() => validateSortingStrategy({ getSortState: () => 'none' } as any)).toThrow();\n  });\n  it('throws when getSortState missing', () => {\n    expect(() => validateSortingStrategy({ doSort: async () => {} } as any)).toThrow();\n  });\n  it('returns true for valid strategy', () => {\n    const s = { doSort: async () => {}, getSortState: async () => 'none' };\n    expect(validateSortingStrategy(s as any)).toBe(true);\n  });\n});\n\ndescribe('validateFillStrategy', () => {\n  it('throws when not a function', () => {\n    expect(() => validateFillStrategy({} as any)).toThrow();\n  });\n  it('returns true for function', () => {\n    expect(validateFillStrategy(() => {})).toBe(true);\n  });\n});\n"},"tests/unit/filterStrategies.more.test.ts":{"tests":[{"id":"75","name":"FilterStrategies additional branches handles function-valued filter (locator-based)"},{"id":"76","name":"FilterStrategies additional branches converts numeric filter to string and uses getByText"},{"id":"77","name":"FilterStrategies additional branches spy strategy sets calledRef and delegates"}],"source":"import { describe, it, expect, vi } from 'vitest';\nimport { FilterStrategies } from '../../src/strategies/filter';\nimport type { TableContext } from '../../src/types';\n\ndescribe('FilterStrategies additional branches', () => {\n  it('handles function-valued filter (locator-based)', () => {\n    const rows: any = { filter: vi.fn().mockReturnThis() };\n    const cellTemplate: any = { nth: vi.fn().mockReturnThis(), locator: vi.fn().mockReturnThis() };\n    const resolve = vi.fn().mockReturnValue(cellTemplate);\n\n    const ctx: TableContext = {\n      root: {} as any,\n      config: { cellSelector: 'td' } as any,\n      page: {} as any,\n      resolve,\n    };\n\n    const filterFn = (cell: any) => cell.locator('input:checked');\n\n    FilterStrategies.default.apply({\n      rows,\n      filter: { column: 'X', value: filterFn },\n      colIndex: 1,\n      tableContext: ctx,\n    } as any);\n\n    expect(cellTemplate.nth).toHaveBeenCalledWith(1);\n    expect(cellTemplate.locator).toHaveBeenCalledWith('input:checked');\n    expect(rows.filter).toHaveBeenCalled();\n  });\n\n  it('converts numeric filter to string and uses getByText', () => {\n    const rows: any = { filter: vi.fn().mockReturnThis() };\n    const cellTemplate: any = { nth: vi.fn().mockReturnThis(), getByText: vi.fn().mockReturnThis() };\n    const resolve = vi.fn().mockReturnValue(cellTemplate);\n\n    const ctx: TableContext = {\n      root: {} as any,\n      config: { cellSelector: 'td' } as any,\n      page: {} as any,\n      resolve,\n    };\n\n    FilterStrategies.default.apply({\n      rows,\n      filter: { column: 'Num', value: 42 },\n      colIndex: 0,\n      tableContext: ctx,\n    } as any);\n\n    expect(cellTemplate.nth).toHaveBeenCalledWith(0);\n    expect(cellTemplate.getByText).toHaveBeenCalledWith('42', { exact: true });\n    expect(rows.filter).toHaveBeenCalled();\n  });\n\n  it('spy strategy sets calledRef and delegates', () => {\n    const rows: any = { filter: vi.fn().mockReturnThis() };\n    const cellTemplate: any = { nth: vi.fn().mockReturnThis(), getByText: vi.fn().mockReturnThis() };\n    const resolve = vi.fn().mockReturnValue(cellTemplate);\n\n    const ctx: TableContext = {\n      root: {} as any,\n      config: { cellSelector: 'td' } as any,\n      page: {} as any,\n      resolve,\n    };\n\n    const calledRef: { called?: boolean } = {};\n    const strat = FilterStrategies.spy(calledRef);\n    strat.apply({ rows, filter: { column: 'Name', value: 'Bob' }, colIndex: 0, tableContext: ctx } as any);\n\n    expect(calledRef.called).toBe(true);\n    expect(cellTemplate.getByText).toHaveBeenCalledWith('Bob', { exact: true });\n  });\n});\n\n"},"tests/unit/stringUtils.test.ts":{"tests":[{"id":"78","name":"String Utils levenshteinDistance should return 0 for identical strings"},{"id":"79","name":"String Utils levenshteinDistance should calculate distance correctly"},{"id":"80","name":"String Utils levenshteinDistance should return 0.1 for case mismatch"},{"id":"81","name":"String Utils stringSimilarity should return very high score for case mismatch (weight 0.1)"},{"id":"82","name":"String Utils stringSimilarity should return high score for all-caps mismatch"},{"id":"83","name":"String Utils stringSimilarity should return 0 for completely different strings"},{"id":"84","name":"String Utils stringSimilarity should return a score between 0 and 1"},{"id":"85","name":"String Utils findSimilar should find exact match"},{"id":"86","name":"String Utils findSimilar should find close match"},{"id":"87","name":"String Utils findSimilar should return empty if no similar strings found"},{"id":"88","name":"String Utils buildColumnNotFoundError should include the missing column name"},{"id":"89","name":"String Utils buildColumnNotFoundError should suggest similar columns"},{"id":"90","name":"String Utils buildColumnNotFoundError should list available columns"}],"source":"import { describe, it, expect } from 'vitest';\nimport { levenshteinDistance, stringSimilarity, findSimilar, buildColumnNotFoundError } from '../../src/utils/stringUtils';\n\ndescribe('String Utils', () => {\n    describe('levenshteinDistance', () => {\n        it('should return 0 for identical strings', () => {\n            expect(levenshteinDistance('abc', 'abc')).toBe(0);\n        });\n\n        it('should calculate distance correctly', () => {\n            expect(levenshteinDistance('kitten', 'sitting')).toBe(3);\n            expect(levenshteinDistance('flaw', 'lawn')).toBe(2);\n        });\n\n        it('should return 0.1 for case mismatch', () => {\n            expect(levenshteinDistance('Abc', 'abc')).toBeCloseTo(0.1);\n        });\n    });\n\n    describe('stringSimilarity', () => {\n        it('should return very high score for case mismatch (weight 0.1)', () => {\n            // 'Abc' vs 'abc' -> distance 0.1, maxLen 3 -> 1 - (0.1/3) = 0.9666...\n            expect(stringSimilarity('Abc', 'abc')).toBeCloseTo(0.967, 3);\n        });\n\n        it('should return high score for all-caps mismatch', () => {\n            // 'ABC' vs 'abc' -> distance 0.3 (3 * 0.1), maxLen 3 -> 1 - (0.3/3) = 0.9\n            expect(stringSimilarity('ABC', 'abc')).toBeCloseTo(0.9, 3);\n        });\n\n        it('should return 0 for completely different strings', () => {\n            // \"abc\" vs \"def\" -> distance 3, maxLen 3 -> 1 - 3/3 = 0\n            expect(stringSimilarity('abc', 'def')).toBe(0);\n        });\n\n        it('should return a score between 0 and 1', () => {\n            const score = stringSimilarity('hello', 'hullo');\n            expect(score).toBeGreaterThan(0);\n            expect(score).toBeLessThan(1);\n        });\n    });\n\n    describe('findSimilar', () => {\n        const available = ['First Name', 'Last Name', 'Email Address', 'Phone Number', 'Status'];\n\n        it('should find exact match', () => {\n            const results = findSimilar('First Name', available);\n            expect(results[0].value).toBe('First Name');\n            expect(results[0].score).toBe(1);\n        });\n\n        it('should find close match', () => {\n            const results = findSimilar('firstname', available);\n            expect(results.length).toBeGreaterThan(0);\n            expect(results[0].value).toBe('First Name');\n        });\n\n        it('should return empty if no similar strings found', () => {\n            const results = findSimilar('Xylophone', available);\n            expect(results).toHaveLength(0);\n        });\n    });\n\n    describe('buildColumnNotFoundError', () => {\n        const available = ['First Name', 'Last Name', 'Email'];\n\n        it('should include the missing column name', () => {\n            const msg = buildColumnNotFoundError('Fist Name', available);\n            expect(msg).toContain(\"Column 'Fist Name' not found\");\n        });\n\n        it('should suggest similar columns', () => {\n            const msg = buildColumnNotFoundError('Fist Name', available);\n            expect(msg).toContain('Did you mean:');\n            expect(msg).toContain('First Name');\n        });\n\n        it('should list available columns', () => {\n            const msg = buildColumnNotFoundError('Random', available);\n            expect(msg).toContain('Available columns: First Name, Last Name, Email');\n        });\n    });\n});\n"},"tests/unit/headers.unit.test.ts":{"tests":[{"id":"91","name":"HeaderStrategies.visible returns trimmed header texts when waitFor succeeds"},{"id":"92","name":"HeaderStrategies.visible handles waitFor throwing and still returns texts"}],"source":"import { describe, it, expect, vi } from 'vitest';\nimport { HeaderStrategies } from '../../src/strategies/headers';\nimport type { StrategyContext } from '../../src/types';\n\ndescribe('HeaderStrategies.visible', () => {\n  it('returns trimmed header texts when waitFor succeeds', async () => {\n    const headerLoc: any = {\n      first: vi.fn().mockReturnThis(),\n      waitFor: vi.fn().mockResolvedValue(undefined),\n      allInnerTexts: vi.fn().mockResolvedValue([' A ', ' B ']),\n    };\n\n    const resolve = vi.fn().mockReturnValue(headerLoc);\n    const ctx: StrategyContext = { config: { headerSelector: 'th' } as any, resolve, root: {} as any, page: {} as any };\n\n    const res = await HeaderStrategies.visible(ctx as any);\n    expect(res).toEqual(['A', 'B']);\n    expect(headerLoc.first).toHaveBeenCalled();\n    expect(headerLoc.allInnerTexts).toHaveBeenCalled();\n  });\n\n  it('handles waitFor throwing and still returns texts', async () => {\n    const headerLoc: any = {\n      first: vi.fn().mockReturnThis(),\n      waitFor: vi.fn().mockRejectedValue(new Error('timeout')),\n      allInnerTexts: vi.fn().mockResolvedValue(['X']),\n    };\n\n    const resolve = vi.fn().mockReturnValue(headerLoc);\n    const ctx: StrategyContext = { config: { headerSelector: 'th' } as any, resolve, root: {} as any, page: {} as any };\n\n    const res = await HeaderStrategies.visible(ctx as any);\n    expect(res).toEqual(['X']);\n    expect(headerLoc.waitFor).toHaveBeenCalled();\n  });\n});\n\n"},"tests/unit/filterEngine.function.test.ts":{"tests":[{"id":"93","name":"FilterEngine - function filters should support function-based filter values"}],"source":"import { describe, it, expect, vi } from 'vitest';\nimport { FilterEngine } from '../../src/filterEngine';\nimport { FinalTableConfig } from '../../src/types';\nimport { Page, Locator } from '@playwright/test';\n\ndescribe('FilterEngine - function filters', () => {\n    const mockConfig = {\n        cellSelector: 'td',\n    } as FinalTableConfig;\n\n    const createRecursiveMockLocator = (name: string) => {\n        const mock: any = {\n            _name: name,\n            filter: vi.fn(),\n            nth: vi.fn(),\n            getByText: vi.fn(),\n            locator: vi.fn(),\n            getByRole: vi.fn(),\n        };\n\n        mock.filter.mockReturnValue(mock);\n        mock.nth.mockReturnValue(mock);\n        mock.getByText.mockReturnValue(mock);\n        mock.locator.mockReturnValue(mock);\n        mock.getByRole.mockReturnValue(mock);\n\n        return mock as unknown as Locator;\n    };\n\n    const mockPage = {\n        locator: vi.fn()\n    } as unknown as Page;\n\n    const mockResolve = vi.fn();\n\n    it('should support function-based filter values', () => {\n        const engine = new FilterEngine(mockConfig, mockResolve);\n        const baseRows = createRecursiveMockLocator('baseRows');\n        const map = new Map<"+"string, number>([['Name', 0]]);\n\n        const mockCellParam = createRecursiveMockLocator('cellParam');\n        mockResolve.mockReturnValue(mockCellParam);\n\n        const filterFn = (cell: Locator) => (cell as any).locator('input:checked');\n\n        const result = engine.applyFilters(baseRows, { 'Name': filterFn }, map, false, mockPage);\n\n        const baseMock = baseRows as any;\n        expect(baseMock.filter).toHaveBeenCalledTimes(1);\n        expect(mockCellParam.nth).toHaveBeenCalledWith(0);\n        expect(mockCellParam.locator).toHaveBeenCalledWith('input:checked');\n    });\n});\n\n"},"tests/unit/resolution.test.ts":{"tests":[{"id":"94","name":"Resolution Strategies default.resolveIndex should resolve by exact string match"},{"id":"95","name":"Resolution Strategies default.resolveIndex should return undefined for non-existent string"},{"id":"96","name":"Resolution Strategies default.resolveIndex should resolve by regex match"},{"id":"97","name":"Resolution Strategies default.resolveIndex should return undefined for non-matching regex"},{"id":"98","name":"Resolution Strategies default.resolveIndex should handle case sensitivity in regex"},{"id":"99","name":"Resolution Strategies default.resolveName should return string query as-is"},{"id":"100","name":"Resolution Strategies default.resolveName should return regex query as string"}],"source":"import { describe, it, expect } from 'vitest';\nimport { ResolutionStrategies } from '../../src/strategies/resolution';\nimport { StrategyContext } from '../../src/types';\n\ndescribe('Resolution Strategies', () => {\n    const headerMap = new Map<"+"string, number>([\n        ['ID', 0],\n        ['First Name', 1],\n        ['Last Name', 2],\n        ['Email', 3],\n        ['Status', 4],\n        ['Created At', 5]\n    ]);\n\n    // Mock context (not used by default strategy but required by type)\n    const mockContext = {} as StrategyContext;\n\n    describe('default.resolveIndex', () => {\n        const resolve = ResolutionStrategies.default.resolveIndex;\n\n        it('should resolve by exact string match', () => {\n            expect(resolve({ query: 'ID', headerMap, context: mockContext })).toBe(0);\n            expect(resolve({ query: 'Email', headerMap, context: mockContext })).toBe(3);\n        });\n\n        it('should return undefined for non-existent string', () => {\n            expect(resolve({ query: 'Phone', headerMap, context: mockContext })).toBeUndefined();\n        });\n\n        it('should resolve by regex match', () => {\n            expect(resolve({ query: /First/, headerMap, context: mockContext })).toBe(1);\n            expect(resolve({ query: /^Last/, headerMap, context: mockContext })).toBe(2);\n            expect(resolve({ query: /at/i, headerMap, context: mockContext })).toBe(4); // \"Status\" has 'at', wait... Status doesn't have at. 'Created At' has 'at'. Status has 'at' inside 'St(at)us'.\n        });\n\n        it('should return undefined for non-matching regex', () => {\n            expect(resolve({ query: /^Z/, headerMap, context: mockContext })).toBeUndefined();\n        });\n\n        it('should handle case sensitivity in regex', () => {\n            expect(resolve({ query: /first name/, headerMap, context: mockContext })).toBeUndefined();\n            expect(resolve({ query: /first name/i, headerMap, context: mockContext })).toBe(1);\n        });\n    });\n\n    describe('default.resolveName', () => {\n        const resolveName = ResolutionStrategies.default.resolveName;\n\n        it('should return string query as-is', () => {\n            expect(resolveName({ query: 'ID', headerMap })).toBe('ID');\n        });\n\n        it('should return regex query as string', () => {\n            const regex = /test/;\n            expect(resolveName({ query: regex, headerMap })).toBe('/test/');\n        });\n    });\n});\n"}},"projectRoot":"/Users/cedrick/Documents/projects/playwright-smart-table","config":{"$schema":"./node_modules/@stryker-mutator/core/schema/stryker-schema.json","mutator":{"plugins":["@stryker-mutator/vitest-runner"],"excludedMutations":[]},"packageManager":"npm","reporters":["html","clear-text","progress"],"testRunner":"vitest","coverageAnalysis":"perTest","mutate":["src/**/*.ts","!src/**/index.ts","!src/types.ts","!src/typeContext.ts","!src/minimalConfigContext.ts"],"allowConsoleColors":true,"checkers":[],"checkerNodeArgs":[],"commandRunner":{"command":"npm test"},"clearTextReporter":{"allowColor":true,"allowEmojis":false,"logTests":true,"maxTestsToLog":3,"reportTests":true,"reportMutants":true,"reportScoreTable":true,"skipFull":false},"dashboard":{"baseUrl":"https://dashboard.stryker-mutator.io/api/reports","reportType":"full"},"dryRunOnly":false,"eventReporter":{"baseDir":"reports/mutation/events"},"ignorePatterns":[],"ignoreStatic":false,"incremental":false,"incrementalFile":"reports/stryker-incremental.json","force":false,"fileLogLevel":"off","inPlace":false,"logLevel":"info","maxConcurrentTestRunners":9007199254740991,"maxTestRunnerReuse":0,"plugins":["@stryker-mutator/*"],"appendPlugins":[],"htmlReporter":{"fileName":"reports/mutation/mutation.html"},"jsonReporter":{"fileName":"reports/mutation/mutation.json"},"disableTypeChecks":true,"symlinkNodeModules":true,"tempDirName":".stryker-tmp","cleanTempDir":true,"testRunnerNodeArgs":[],"thresholds":{"high":80,"low":60,"break":null},"timeoutFactor":1.5,"timeoutMS":5000,"dryRunTimeoutMinutes":5,"tsconfigFile":"tsconfig.json","warnings":true,"disableBail":false,"allowEmpty":false,"ignorers":[],"testFiles":[],"vitest":{"related":true}},"framework":{"name":"StrykerJS","version":"9.6.0","branding":{"homepageUrl":"https://stryker-mutator.io","imageUrl":"data:image/svg+xml;utf8,%3Csvg viewBox='0 0
